<!doctype html>
<html lang="it">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover,user-scalable=no">
<meta name="theme-color" content="#f7edf8">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="Travels">
<link rel="manifest" href="manifest.webmanifest">
<title>Travels</title>
<style>
:root{--pink:#ff2aa3;--violet:#8e58ff;--ink:#32152a;--muted:#8c6d80;--line:rgba(255,255,255,.72)}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{margin:0;min-height:100%;font-family:-apple-system,BlinkMacSystemFont,"SF Pro Display","Segoe UI",sans-serif;color:var(--ink);background:radial-gradient(circle at 10% 0,#ffd8ee 0,transparent 28%),radial-gradient(circle at 95% 12%,#ecd9ff 0,transparent 32%),linear-gradient(160deg,#fff8fc,#f7edf8 55%,#efe8ff)}
button,input{font:inherit;color:inherit}
.app{min-height:100svh;padding:calc(env(safe-area-inset-top) + 18px) 24px calc(env(safe-area-inset-bottom) + 24px)}
.glass{background:linear-gradient(135deg,rgba(255,255,255,.78),rgba(255,255,255,.42));border:1px solid var(--line);box-shadow:0 18px 45px rgba(112,35,86,.12),inset 0 1px 0 rgba(255,255,255,.95);backdrop-filter:blur(24px) saturate(150%);-webkit-backdrop-filter:blur(24px) saturate(150%)}
.topbar{height:74px;border-radius:28px;display:flex;align-items:center;gap:16px;padding:0 18px;position:sticky;top:calc(env(safe-area-inset-top) + 10px);z-index:20}
.brand{font-size:30px;font-weight:700;letter-spacing:-1px}.brand small{display:block;font-size:11px;font-weight:500;color:var(--muted);letter-spacing:0;margin-top:2px}
.search{flex:1;max-width:560px;margin-left:auto;display:flex;align-items:center;gap:10px;background:rgba(255,255,255,.48);border-radius:18px;padding:11px 14px}
.search input{width:100%;border:0;outline:0;background:transparent}
.edit{border:0;border-radius:16px;padding:11px 16px;background:linear-gradient(145deg,var(--pink),var(--violet));color:#fff}
.heading{margin:30px 4px 18px}.heading h1{margin:0;font-size:34px;letter-spacing:-1.2px}.heading p{margin:6px 0 0;color:var(--muted)}
.boards{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:24px}
.board{border-radius:30px;padding:15px;min-height:390px}
.board-title{display:flex;align-items:flex-start;gap:10px;margin-bottom:13px}.board-title h2{margin:0;font-size:21px;line-height:1.1}.board-title p{margin:5px 0 0;font-size:12px;color:var(--muted)}
.board-title button{margin-left:auto;border:0;background:rgba(255,255,255,.54);border-radius:13px;width:36px;height:36px}
.collage{display:grid;grid-template-columns:1.15fr .85fr;grid-template-rows:1fr 1fr;gap:8px;height:300px}
.collage img{width:100%;height:100%;object-fit:cover;border-radius:18px;display:block}.collage img:first-child{grid-row:1/3}
.count{display:inline-block;margin-top:11px;font-size:11px;color:var(--muted)}
.modal{position:fixed;inset:0;z-index:50;display:none;align-items:center;justify-content:center;background:rgba(36,8,28,.28);padding:24px}.modal.open{display:flex}
.modal-card{width:min(460px,100%);padding:20px;border-radius:28px}.modal-card h3{margin:0 0 14px}
.modal-card label{display:block;font-size:11px;color:var(--muted);margin:10px 0 5px}.modal-card input{width:100%;border:1px solid rgba(100,40,80,.10);outline:0;background:rgba(255,255,255,.65);border-radius:15px;padding:12px}
.modal-actions{display:flex;gap:10px;margin-top:16px}.modal-actions button{flex:1;border:0;border-radius:15px;padding:12px}.cancel{background:rgba(255,255,255,.62)}.save{background:linear-gradient(145deg,var(--pink),var(--violet));color:white}
@media(max-width:900px){.boards{grid-template-columns:1fr}}
</style>
</head>
<body>
<div class="app">
<header class="topbar glass">
  <div class="brand">Travels<small>save places, imagine escapes</small></div>
  <div class="search">⌕ <input id="searchInput" placeholder="Cerca una destinazione"></div>
  <button class="edit" id="editMode">Modifica titoli</button>
</header>

<section class="heading">
  <h1>Le tue board</h1>
  <p>Mare, città e fughe possibili</p>
</section>

<main class="boards" id="boards"></main>
</div>

<div class="modal" id="modal">
  <div class="modal-card glass">
    <h3>Modifica board</h3>
    <label>Titolo</label>
    <input id="titleInput">
    <label>Sottotitolo</label>
    <input id="subtitleInput">
    <div class="modal-actions">
      <button class="cancel" id="cancelBtn">Annulla</button>
      <button class="save" id="saveBtn">Salva</button>
    </div>
  </div>
</div>

<script>
const defaults=[{"id": "santorini", "title": "Santorini", "subtitle": "Oia, tramonti e terrazze bianche", "images": ["santorini_01.webp", "santorini_02.webp", "santorini_03.webp"]}, {"id": "mykonos", "title": "Mykonos", "subtitle": "mare, mulini e Little Venice", "images": ["mykonos_01.webp", "mykonos_02.webp", "mykonos_03.webp"]}, {"id": "lisbon", "title": "Lisbona", "subtitle": "tram, salite e quartieri storici", "images": ["lisbon_01.webp", "lisbon_02.webp", "lisbon_03.webp"]}, {"id": "brighton", "title": "Brighton", "subtitle": "molo, mare e atmosfera inglese", "images": ["brighton_01.webp", "brighton_02.webp", "brighton_03.webp"]}];
let boards=JSON.parse(localStorage.getItem("travelsBoardsReal")||"null")||defaults;
let editing=false,currentId=null;

function save(){localStorage.setItem("travelsBoardsReal",JSON.stringify(boards))}
function render(filter=""){
  document.getElementById("boards").innerHTML=boards
    .filter(b=>(b.title+" "+b.subtitle).toLowerCase().includes(filter.toLowerCase()))
    .map(b=>`
      <article class="board glass">
        <div class="board-title">
          <div><h2>${b.title}</h2><p>${b.subtitle}</p></div>
          ${editing?`<button data-edit="${b.id}">✎</button>`:""}
        </div>
        <div class="collage">
          ${b.images.map(img=>`<img src="assets/images/${img}" alt="">`).join("")}
        </div>
        <span class="count">3 idee salvate</span>
      </article>
    `).join("");
}

document.getElementById("editMode").onclick=()=>{
  editing=!editing;
  document.getElementById("editMode").textContent=editing?"Fine":"Modifica titoli";
  render(document.getElementById("searchInput").value);
};
document.getElementById("searchInput").addEventListener("input",e=>render(e.target.value));
document.addEventListener("click",e=>{
  const btn=e.target.closest("[data-edit]");
  if(!btn)return;
  currentId=btn.dataset.edit;
  const board=boards.find(b=>b.id===currentId);
  document.getElementById("titleInput").value=board.title;
  document.getElementById("subtitleInput").value=board.subtitle;
  document.getElementById("modal").classList.add("open");
});
document.getElementById("cancelBtn").onclick=()=>document.getElementById("modal").classList.remove("open");
document.getElementById("saveBtn").onclick=()=>{
  const board=boards.find(b=>b.id===currentId);
  board.title=document.getElementById("titleInput").value.trim()||board.title;
  board.subtitle=document.getElementById("subtitleInput").value.trim()||board.subtitle;
  save();render(document.getElementById("searchInput").value);
  document.getElementById("modal").classList.remove("open");
};
render();
</script>
</body>
</html>
