<!doctype html>
<html lang="it">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover,user-scalable=no">
<meta name="theme-color" content="#c20a79">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Texty">
<link rel="manifest" href="manifest.webmanifest">
<title>Texty</title>
<style>
:root{
  --pink:#ff2aa3;--violet:#8f5cff;--deep:#5c073f;--ink:#fff;
  --glass:rgba(255,255,255,.14);--line:rgba(255,255,255,.26);
  --incoming:rgba(255,255,255,.14);--outgoing:linear-gradient(145deg,#ff42ad,#9a61ff);
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{margin:0;min-height:100%;font-family:-apple-system,BlinkMacSystemFont,"SF Pro Display","Segoe UI",sans-serif;color:#fff;background:
radial-gradient(circle at 15% 0,#ff42ac 0,transparent 28%),
radial-gradient(circle at 95% 14%,#7c2d8f 0,transparent 35%),
linear-gradient(180deg,#c60a79,#52063b);overflow:hidden}
button,input{font:inherit;color:inherit}
.glass{background:linear-gradient(135deg,rgba(255,255,255,.19),rgba(255,255,255,.07));border:1px solid var(--line);box-shadow:0 20px 55px rgba(49,0,30,.3),inset 0 1px 0 rgba(255,255,255,.28);backdrop-filter:blur(24px) saturate(160%);-webkit-backdrop-filter:blur(24px) saturate(160%)}
.app{max-width:520px;margin:auto;height:100svh;position:relative;overflow:hidden}
.screen{position:absolute;inset:0;display:none;padding:calc(env(safe-area-inset-top) + 10px) 10px calc(env(safe-area-inset-bottom) + 10px)}
.screen.active{display:flex;flex-direction:column}
.top{height:66px;border-radius:25px;display:flex;align-items:center;gap:11px;padding:0 14px;flex:0 0 auto}
.brand{font-size:27px;font-weight:300;letter-spacing:3px;flex:1}
.iconbtn{width:41px;height:41px;border:0;border-radius:15px;background:rgba(255,255,255,.13);font-size:20px}
.search{margin:13px 0 10px;border-radius:20px;padding:12px 14px;display:flex;gap:9px;align-items:center}
.search input{width:100%;border:0;outline:0;background:transparent;font-size:14px}
.list{overflow-y:auto;padding-bottom:20px}
.chatrow{display:flex;align-items:center;gap:12px;padding:13px 11px;border-bottom:1px solid rgba(255,255,255,.10);cursor:pointer}
.avatar{width:52px;height:52px;border-radius:18px;background:linear-gradient(145deg,#ff5ab7,#845cff);display:grid;place-items:center;font-weight:700;flex:0 0 auto}
.rowtext{min-width:0;flex:1}.rowtext b{display:block;font-size:14px}.rowtext p{margin:4px 0 0;font-size:12px;opacity:.68;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.rowmeta{text-align:right;font-size:11px;opacity:.72}.badge{display:inline-grid;place-items:center;min-width:20px;height:20px;border-radius:99px;background:#ff4aad;margin-top:7px;padding:0 6px;font-size:10px}
.chathead{height:66px;border-radius:25px;display:flex;align-items:center;gap:10px;padding:0 11px;flex:0 0 auto}
.back{width:40px;height:40px;border:0;border-radius:14px;background:rgba(255,255,255,.13);font-size:23px}
.chathead .avatar{width:42px;height:42px;border-radius:15px}
.headmeta{flex:1}.headmeta b{display:block;font-size:14px}.headmeta small{font-size:11px;opacity:.68}
.messages{flex:1;overflow-y:auto;padding:17px 6px 12px;display:flex;flex-direction:column;gap:9px}
.day{align-self:center;font-size:10px;padding:6px 10px;border-radius:99px;background:rgba(255,255,255,.11)}
.msg{max-width:79%;padding:10px 12px;border-radius:19px;font-size:14px;line-height:1.35;position:relative}
.msg.in{align-self:flex-start;background:var(--incoming);border:1px solid rgba(255,255,255,.12)}
.msg.out{align-self:flex-end;background:var(--outgoing)}
.msg .time{display:block;font-size:9px;opacity:.65;text-align:right;margin-top:5px}
.sender{display:block;font-size:10px;font-weight:700;color:#ffd3ea;margin-bottom:4px}
.audio{display:flex;align-items:center;gap:10px;min-width:210px}
.play{width:34px;height:34px;border:0;border-radius:50%;background:rgba(255,255,255,.18)}
.wave{flex:1;display:flex;align-items:center;gap:2px;height:28px}
.wave i{display:block;width:3px;border-radius:4px;background:rgba(255,255,255,.75)}
.wave i:nth-child(3n){height:22px}.wave i:nth-child(3n+1){height:12px}.wave i:nth-child(3n+2){height:18px}
.composer{border-radius:24px;padding:8px;display:flex;align-items:flex-end;gap:8px;flex:0 0 auto}
.composer input{flex:1;border:0;outline:0;background:rgba(255,255,255,.08);border-radius:18px;padding:12px 13px;font-size:14px}
.send,.mic{width:44px;height:44px;border:0;border-radius:17px;background:linear-gradient(145deg,#ff3daa,#955cff);font-size:19px}
.recording{display:none;align-items:center;gap:10px;flex:1;padding:0 8px}.recording.show{display:flex}.dot{width:10px;height:10px;border-radius:50%;background:#ff3e9f;animation:blink .8s infinite}@keyframes blink{50%{opacity:.25}}
.timer{font-variant-numeric:tabular-nums}.cancel{margin-left:auto;border:0;background:none;font-size:12px;opacity:.7}
.hidden{display:none!important}
.director{position:fixed;z-index:90;right:16px;top:calc(env(safe-area-inset-top) + 82px);width:48px;height:48px;border-radius:17px;border:1px solid rgba(255,255,255,.25);background:rgba(25,0,16,.45);backdrop-filter:blur(16px);font-size:19px;opacity:.18}
.director-panel{position:fixed;z-index:100;right:12px;top:calc(env(safe-area-inset-top) + 140px);width:220px;border-radius:22px;padding:12px;display:none}
.director-panel.open{display:block}
.director-panel button{width:100%;border:0;border-radius:14px;padding:10px;margin:4px 0;background:rgba(255,255,255,.12);text-align:left;font-size:12px}
.typing{align-self:flex-start;font-size:12px;opacity:.7;padding:8px 12px;background:rgba(255,255,255,.10);border-radius:18px}
</style>
</head>
<body>
<div class="app">
<section id="listScreen" class="screen active">
  <header class="top glass"><div class="brand">Texty</div><button class="iconbtn">⌕</button><button class="iconbtn">＋</button></header>
  <div class="search glass">⌕ <input placeholder="Cerca nelle chat"></div>
  <div class="list" id="chatList"></div>
</section>

<section id="chatScreen" class="screen">
  <header class="chathead glass">
    <button class="back">‹</button>
    <div class="avatar" id="chatAvatar">M</div>
    <div class="headmeta"><b id="chatTitle">Martina</b><small id="chatStatus">online</small></div>
    <button class="iconbtn">⌕</button>
    <button class="iconbtn">⋯</button>
  </header>
  <div class="messages" id="messages"></div>
  <div class="composer glass">
    <button class="iconbtn">＋</button>
    <input id="textInput" placeholder="Messaggio">
    <div class="recording" id="recording"><span class="dot"></span><span class="timer" id="timer">0:00</span><button class="cancel" id="cancelRec">Annulla</button></div>
    <button class="send" id="sendBtn">➤</button>
    <button class="mic" id="micBtn">●</button>
  </div>
</section>
</div>

<button class="director">◈</button>
<div class="director-panel glass" id="directorPanel">
  <button data-action="incoming">Fai arrivare un messaggio</button>
  <button data-action="typing">Mostra “sta scrivendo…”</button>
  <button data-action="audio">Fai arrivare un vocale</button>
  <button data-action="reset">Reset scena</button>
</div>

<script>
const chats=[
 {id:"martina",title:"Martina",avatar:"M",status:"online",preview:"Sei già uscita?",time:"10:42",unread:2,group:false,
  messages:[
   {type:"day",text:"Oggi"},
   {side:"in",text:"Ehi, stasera vieni?",time:"10:31"},
   {side:"out",text:"Non lo so ancora",time:"10:35"},
   {side:"in",text:"Dai, ci siamo tutti",time:"10:36"},
   {side:"in",audio:true,duration:"0:12",time:"10:37"}
  ]},
 {id:"gruppo",title:"Weekend al mare",avatar:"4",status:"4 partecipanti",preview:"Luca: ho prenotato!",time:"09:18",unread:5,group:true,
  messages:[
   {type:"day",text:"Oggi"},
   {side:"in",sender:"Luca",text:"Ho prenotato!",time:"09:02"},
   {side:"in",sender:"Giulia",text:"No vabbè 😍",time:"09:04"},
   {side:"out",text:"Mandate tutto qui",time:"09:10"},
   {side:"in",sender:"Martina",audio:true,duration:"0:08",time:"09:12"}
  ]},
 {id:"mamma",title:"Mamma",avatar:"M",status:"ultimo accesso 09:44",preview:"Fammi sapere quando arrivi",time:"Ieri",unread:0,group:false,
  messages:[
   {type:"day",text:"Ieri"},
   {side:"in",text:"Hai mangiato?",time:"20:12"},
   {side:"out",text:"Sì tranquilla",time:"20:15"},
   {side:"in",text:"Fammi sapere quando arrivi",time:"20:16"}
  ]},
 {id:"lavoro",title:"Lavoro",avatar:"L",status:"6 partecipanti",preview:"Sara: perfetto, grazie",time:"Ieri",unread:0,group:true,
  messages:[
   {type:"day",text:"Ieri"},
   {side:"in",sender:"Sara",text:"Domani call alle 9?",time:"17:41"},
   {side:"out",text:"Per me va bene",time:"17:44"},
   {side:"in",sender:"Paolo",text:"Perfetto",time:"17:45"}
  ]}
];

let current=null, recTimer=null, recSeconds=0, sceneSnapshot=null;
const list=document.getElementById("chatList"), messages=document.getElementById("messages");

function renderList(){
 list.innerHTML=chats.map(c=>`<div class="chatrow" data-id="${c.id}">
 <div class="avatar">${c.avatar}</div><div class="rowtext"><b>${c.title}</b><p>${c.preview}</p></div>
 <div class="rowmeta">${c.time}${c.unread?`<div class="badge">${c.unread}</div>`:""}</div></div>`).join("");
}

function audioHTML(m){
 return `<div class="audio"><button class="play">▶</button><div class="wave">${"<i></i>".repeat(16)}</div><span>${m.duration||"0:09"}</span></div>`;
}

function renderMessages(){
 messages.innerHTML=current.messages.map(m=>{
  if(m.type==="day") return `<div class="day">${m.text}</div>`;
  return `<div class="msg ${m.side}">${m.sender?`<span class="sender">${m.sender}</span>`:""}${m.audio?audioHTML(m):m.text}<span class="time">${m.time}</span></div>`;
 }).join("");
 messages.scrollTop=messages.scrollHeight;
}

function openChat(id){
 current=chats.find(c=>c.id===id);
 sceneSnapshot=JSON.stringify(current.messages);
 document.getElementById("chatTitle").textContent=current.title;
 document.getElementById("chatAvatar").textContent=current.avatar;
 document.getElementById("chatStatus").textContent=current.status;
 document.getElementById("listScreen").classList.remove("active");
 document.getElementById("chatScreen").classList.add("active");
 renderMessages();
}

function addText(text,side="out",sender=""){
 if(!text.trim())return;
 current.messages.push({side,text:text.trim(),sender,time:new Date().toLocaleTimeString("it-IT",{hour:"2-digit",minute:"2-digit"})});
 renderMessages();
}

renderList();

document.addEventListener("click",e=>{
 const row=e.target.closest(".chatrow");if(row)openChat(row.dataset.id);
 if(e.target.closest(".back")){document.getElementById("chatScreen").classList.remove("active");document.getElementById("listScreen").classList.add("active")}
 if(e.target.closest("#sendBtn")){addText(document.getElementById("textInput").value);document.getElementById("textInput").value=""}
 const play=e.target.closest(".play");if(play){play.textContent=play.textContent==="▶"?"❚❚":"▶"}
 if(e.target.closest(".director"))document.getElementById("directorPanel").classList.toggle("open");
 const act=e.target.closest("[data-action]");
 if(act&&current){
   const a=act.dataset.action;
   if(a==="incoming")addText("Stiamo già andando, tu dove sei?","in",current.group?"Martina":"");
   if(a==="typing"){
      const t=document.createElement("div");t.className="typing";t.textContent="sta scrivendo…";messages.appendChild(t);messages.scrollTop=messages.scrollHeight;
      setTimeout(()=>t.remove(),2500);
   }
   if(a==="audio"){current.messages.push({side:"in",sender:current.group?"Giulia":"",audio:true,duration:"0:11",time:new Date().toLocaleTimeString("it-IT",{hour:"2-digit",minute:"2-digit"})});renderMessages()}
   if(a==="reset"){current.messages=JSON.parse(sceneSnapshot);renderMessages()}
 }
});

document.getElementById("textInput").addEventListener("keydown",e=>{
 if(e.key==="Enter"){addText(e.target.value);e.target.value=""}
});

const mic=document.getElementById("micBtn"), input=document.getElementById("textInput"), recording=document.getElementById("recording");
mic.addEventListener("click",()=>{
 if(!recTimer){
   recSeconds=0;input.classList.add("hidden");recording.classList.add("show");mic.textContent="■";
   recTimer=setInterval(()=>{recSeconds++;document.getElementById("timer").textContent=`${Math.floor(recSeconds/60)}:${String(recSeconds%60).padStart(2,"0")}`},1000);
 }else{
   clearInterval(recTimer);recTimer=null;input.classList.remove("hidden");recording.classList.remove("show");mic.textContent="●";
   current.messages.push({side:"out",audio:true,duration:`0:${String(Math.max(recSeconds,1)).padStart(2,"0")}`,time:new Date().toLocaleTimeString("it-IT",{hour:"2-digit",minute:"2-digit"})});
   renderMessages();
 }
});
document.getElementById("cancelRec").addEventListener("click",()=>{
 clearInterval(recTimer);recTimer=null;input.classList.remove("hidden");recording.classList.remove("show");mic.textContent="●";
});
</script>
</body>
</html>
