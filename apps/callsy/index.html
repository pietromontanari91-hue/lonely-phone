<!doctype html>
<html lang="it">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover,user-scalable=no">
<meta name="theme-color" content="#F4EFE6">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black">
<meta name="apple-mobile-web-app-title" content="Callsy">
<link rel="manifest" href="manifest.webmanifest">
<link rel="stylesheet" href="../../core/design-tokens.css">
<title>Callsy</title>
<style>
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{margin:0;min-height:100%;background:#000;color:#fff;font-family:-apple-system,BlinkMacSystemFont,"SF Pro Display","Segoe UI",sans-serif;overflow:hidden}
button,input,select{font:inherit;color:inherit}
.app{position:relative;width:100%;height:100svh;max-width:520px;margin:auto;background:#000;overflow:hidden}
.screen{position:absolute;inset:0;display:none}.screen.active{display:block}
#standby{background:#000}
.lock,.incall{background:radial-gradient(circle at 50% 18%,rgba(255,51,161,.25),transparent 28%),radial-gradient(circle at 78% 38%,rgba(126,75,255,.2),transparent 30%),linear-gradient(180deg,#17000f,#020002 78%)}
.status{position:absolute;top:calc(env(safe-area-inset-top) + 8px);left:18px;right:18px;display:flex;justify-content:space-between;font-size:14px;font-weight:700}
.time{position:absolute;top:calc(env(safe-area-inset-top) + 62px);left:0;right:0;text-align:center}
.clock{font-size:76px;font-weight:200;letter-spacing:-4px}.date{margin-top:10px;font-size:16px;opacity:.74}
.caller{position:absolute;top:34%;left:0;right:0;text-align:center}.incall .caller{top:20%}
.avatar{width:108px;height:108px;margin:auto;border-radius:38px;display:grid;place-items:center;font-size:38px;font-weight:700;background:linear-gradient(145deg,#ff4bad,#8e58ff)}
.caller h1{margin:18px 0 5px;font-size:34px;font-weight:500}.caller p,.timer{font-size:15px;opacity:.7}.timer{font-variant-numeric:tabular-nums}
.call-actions{position:absolute;left:24px;right:24px;bottom:calc(env(safe-area-inset-bottom) + 34px);display:flex;justify-content:space-between}
.call-button{width:78px;height:78px;border:0;border-radius:50%;font-size:28px}.decline{background:#ef3f5f}.accept{background:#36c86d}.label{text-align:center;margin-top:7px;font-size:12px;opacity:.75}
.controls{position:absolute;left:24px;right:24px;bottom:calc(env(safe-area-inset-bottom) + 36px);display:grid;grid-template-columns:repeat(3,1fr);gap:22px 18px}
.control{text-align:center;font-size:12px}.control button{width:68px;height:68px;border:0;border-radius:50%;background:rgba(255,255,255,.14);font-size:25px}.control.end{grid-column:2}.control.end button{background:#ef3f5f}
.director-trigger{position:fixed;z-index:90;right:14px;top:calc(env(safe-area-inset-top) + 28px);width:60px;height:60px;border-radius:20px;border:1px solid rgba(255,255,255,.24);background:rgba(255,255,255,.08);opacity:.45}
.panel{position:fixed;inset:0;z-index:100;display:none;padding:calc(env(safe-area-inset-top) + 18px) 12px calc(env(safe-area-inset-bottom) + 18px);background:rgba(0,0,0,.82)}
.panel.open{display:flex}
.panel-card{width:min(100%,520px);margin:auto;padding:18px;border-radius:28px;background:linear-gradient(135deg,rgba(255,255,255,.18),rgba(255,255,255,.07));border:1px solid rgba(255,255,255,.22);backdrop-filter:blur(24px)}
.panel-head{display:flex;justify-content:space-between;align-items:center}.panel-head h2{margin:0;font-size:20px}.close-panel{width:40px;height:40px;border:0;border-radius:14px;background:rgba(255,255,255,.12)}
.field{margin:12px 0}.field label{display:block;font-size:11px;opacity:.7;margin-bottom:5px}.field input,.field select{width:100%;border:1px solid rgba(255,255,255,.15);outline:0;background:rgba(255,255,255,.08);border-radius:15px;padding:12px}
.primary,.secondary{width:100%;border:0;border-radius:15px;padding:13px;margin-top:8px}.primary{background:linear-gradient(145deg,#ff2aa3,#8e58ff)}.secondary{background:rgba(255,255,255,.11)}
.countdown{margin-top:12px;padding:11px;border-radius:14px;text-align:center;background:rgba(255,255,255,.08);font-variant-numeric:tabular-nums}

.status,
.time,
.director-trigger{
  display:none !important;
}

.lock{
  overflow:hidden;
}
.ambient{
  position:absolute;
  border-radius:50%;
  filter:blur(42px);
  opacity:.34;
  pointer-events:none;
}
.ambient-one{
  width:260px;
  height:260px;
  top:18%;
  left:-70px;
  background:rgba(255,46,165,.38);
  animation:ambientMoveOne 7s ease-in-out infinite alternate;
}
.ambient-two{
  width:320px;
  height:320px;
  right:-110px;
  bottom:8%;
  background:rgba(122,80,255,.32);
  animation:ambientMoveTwo 8s ease-in-out infinite alternate;
}
@keyframes ambientMoveOne{
  to{transform:translate(70px,45px) scale(1.12)}
}
@keyframes ambientMoveTwo{
  to{transform:translate(-60px,-40px) scale(.92)}
}
.rings{
  position:absolute;
  top:34%;
  left:50%;
  width:108px;
  height:108px;
  transform:translate(-50%,-50%);
  pointer-events:none;
  z-index:2;
}
.rings i{
  position:absolute;
  inset:0;
  border:1px solid rgba(255,255,255,.28);
  border-radius:38px;
  animation:ringPulse 2.4s ease-out infinite;
}
.rings i:nth-child(2){animation-delay:.8s}
.rings i:nth-child(3){animation-delay:1.6s}
@keyframes ringPulse{
  0%{transform:scale(.8);opacity:.65}
  100%{transform:scale(2.4);opacity:0}
}
#incoming .caller{
  animation:callerFloat 3.2s ease-in-out infinite;
}
@keyframes callerFloat{
  0%,100%{transform:translateY(0)}
  50%{transform:translateY(-7px)}
}
#incoming .avatar{
  animation:avatarGlow 2.1s ease-in-out infinite;
}
@keyframes avatarGlow{
  0%,100%{box-shadow:0 18px 50px rgba(0,0,0,.35),0 0 0 0 rgba(255,255,255,.08)}
  50%{box-shadow:0 22px 58px rgba(0,0,0,.42),0 0 0 10px rgba(255,255,255,.05)}
}
#incoming .accept{
  animation:acceptPulse 1.5s ease-in-out infinite;
}
#incoming .decline{
  animation:declinePulse 1.8s ease-in-out infinite;
}
@keyframes acceptPulse{
  0%,100%{transform:scale(1)}
  50%{transform:scale(1.07)}
}
@keyframes declinePulse{
  0%,100%{transform:scale(1)}
  50%{transform:scale(1.04)}
}
#incoming.active{
  animation:screenFade .35s ease;
}
@keyframes screenFade{
  from{opacity:0}
  to{opacity:1}
}


</style>
<link rel="stylesheet" href="../../core/app-theme.css">
</head>
<body class="pandrero-app pandrero-callsy">
<div class="app">
<section id="standby" class="screen active"></section>

<section id="incoming" class="screen lock">
  <div class="ambient ambient-one"></div>
  <div class="ambient ambient-two"></div>
  <div class="rings"><i></i><i></i><i></i></div>
  <div class="status"><span id="statusTime">09:41</span><span>●●● ᯤ ▰</span></div>
  <div class="time"><div class="clock" id="lockClock">09:41</div><div class="date" id="lockDate"></div></div>
  <div class="caller"><div class="avatar" id="incomingAvatar">M</div><h1 id="incomingName">Martina</h1><p>chiamata in arrivo</p></div>
  <div class="call-actions">
    <div><button class="call-button decline" id="declineBtn">✕</button><div class="label">Rifiuta</div></div>
    <div><button class="call-button accept" id="acceptBtn">✓</button><div class="label">Rispondi</div></div>
  </div>
</section>

<section id="incall" class="screen incall">
  <div class="status"><span id="callStatusTime">09:41</span><span>●●● ᯤ ▰</span></div>
  <div class="caller"><div class="avatar" id="callAvatar">M</div><h1 id="callName">Martina</h1><div class="timer" id="callTimer">00:00</div></div>
  <div class="controls">
    <div class="control"><button>◉</button><div>Silenzioso</div></div>
    <div class="control"><button>⌨</button><div>Tastierino</div></div>
    <div class="control"><button>◍</button><div>Altoparlante</div></div>
    <div class="control"><button>＋</button><div>Aggiungi</div></div>
    <div class="control end"><button id="endCallBtn">✕</button><div>Termina</div></div>
    <div class="control"><button>◎</button><div>Contatti</div></div>
  </div>
</section>
</div>

<button class="director-trigger" id="directorTrigger">◈</button>

<div class="panel" id="panel">
  <div class="panel-card">
    <div class="panel-head"><h2>Regia chiamata</h2><button class="close-panel" id="closePanel">×</button></div>
    <div class="field"><label>Nome contatto</label><input id="callerName" value="Martina"></div>
    <div class="field"><label>Iniziale avatar</label><input id="callerAvatar" value="M" maxlength="2"></div>
    <div class="field"><label>Ritardo</label>
      <select id="delay">
        <option value="3">3 secondi</option>
        <option value="5" selected>5 secondi</option>
        <option value="10">10 secondi</option>
        <option value="15">15 secondi</option>
        <option value="30">30 secondi</option>
      </select>
    </div>
    <button class="primary" id="armCallBtn">Programma chiamata e standby</button>
    <button class="secondary" id="testCallBtn">Test immediato</button>
    <button class="secondary" id="cancelScheduledBtn">Annulla chiamata programmata</button>
    <button class="secondary" id="resetBtn">Reset completo</button>
    <div class="countdown" id="countdown">Nessuna chiamata programmata</div>
  </div>
</div>

<script>
const $=id=>document.getElementById(id);
let targetTime=null,scheduler=null,ringTimer=null,activeCallTimer=null,callSeconds=0,audioContext=null;

function showScreen(id){
  document.querySelectorAll(".screen").forEach(s=>s.classList.remove("active"));
  $(id).classList.add("active");
}

function updateClock(){
  const d=new Date();
  const t=d.toLocaleTimeString("it-IT",{hour:"2-digit",minute:"2-digit"});
  $("statusTime").textContent=t;
  $("callStatusTime").textContent=t;
  $("lockClock").textContent=t;
  $("lockDate").textContent=d.toLocaleDateString("it-IT",{weekday:"long",day:"numeric",month:"long"});
}
updateClock();
setInterval(updateClock,30000);

function setupCaller(){
  const name=$("callerName").value.trim()||"Martina";
  const av=$("callerAvatar").value.trim()||name.charAt(0).toUpperCase();
  $("incomingName").textContent=name;
  $("callName").textContent=name;
  $("incomingAvatar").textContent=av;
  $("callAvatar").textContent=av;
}

function beep(){
  try{
    audioContext=audioContext||new (window.AudioContext||window.webkitAudioContext)();
    const osc=audioContext.createOscillator();
    const gain=audioContext.createGain();
    osc.frequency.value=640;
    gain.gain.value=.07;
    osc.connect(gain);
    gain.connect(audioContext.destination);
    osc.start();
    osc.stop(audioContext.currentTime+.18);
  }catch(e){}
  if(navigator.vibrate)navigator.vibrate([250,120,250]);
}

function startRinging(){
  clearInterval(scheduler);
  scheduler=null;
  targetTime=null;
  setupCaller();
  showScreen("incoming");
  $("countdown").textContent="Chiamata in corso";
  beep();
  ringTimer=setInterval(beep,1800);
}

function scheduleCall(seconds){
  clearInterval(scheduler);
  targetTime=Date.now()+seconds*1000;
  scheduler=setInterval(()=>{
    const left=Math.max(0,Math.ceil((targetTime-Date.now())/1000));
    $("countdown").textContent=left>0?`Chiamata tra ${left} secondi`:"Chiamata in arrivo";
    if(Date.now()>=targetTime)startRinging();
  },200);
}

function stopRinging(){
  clearInterval(ringTimer);
  ringTimer=null;
  if(navigator.vibrate)navigator.vibrate(0);
}

function startCall(){
  stopRinging();
  showScreen("incall");
  callSeconds=0;
  $("callTimer").textContent="00:00";
  activeCallTimer=setInterval(()=>{
    callSeconds++;
    const m=String(Math.floor(callSeconds/60)).padStart(2,"0");
    const s=String(callSeconds%60).padStart(2,"0");
    $("callTimer").textContent=`${m}:${s}`;
  },1000);
}

function resetAll(){
  clearInterval(scheduler);
  clearInterval(activeCallTimer);
  stopRinging();
  scheduler=null;
  targetTime=null;
  $("countdown").textContent="Nessuna chiamata programmata";
  $("panel").classList.remove("open");
  showScreen("standby");
}

$("directorTrigger").onclick=()=>$("panel").classList.add("open");
$("closePanel").onclick=()=>$("panel").classList.remove("open");
$("armCallBtn").onclick=()=>{
  setupCaller();
  const seconds=Number($("delay").value);
  $("panel").classList.remove("open");
  showScreen("standby");
  scheduleCall(seconds);
};
$("testCallBtn").onclick=()=>{
  $("panel").classList.remove("open");
  startRinging();
};
$("cancelScheduledBtn").onclick=()=>{
  clearInterval(scheduler);
  scheduler=null;
  targetTime=null;
  $("countdown").textContent="Chiamata annullata";
};
$("resetBtn").onclick=resetAll;
$("acceptBtn").onclick=startCall;
$("declineBtn").onclick=()=>{
  stopRinging();
  showScreen("standby");
};
$("endCallBtn").onclick=()=>{
  clearInterval(activeCallTimer);
  showScreen("standby");
};

let taps=0,tapReset=null;
$("standby").addEventListener("pointerup",()=>{
  taps++;
  clearTimeout(tapReset);
  if(taps>=4){
    $("panel").classList.add("open");
    taps=0;
  }
  tapReset=setTimeout(()=>taps=0,1200);
});
</script>
</body>
</html>
