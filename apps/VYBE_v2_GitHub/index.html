<!doctype html>
<html lang="it">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover,user-scalable=no">
<meta name="theme-color" content="#d50b83">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="VYBE">
<link rel="manifest" href="manifest.webmanifest">
<link rel="apple-touch-icon" href="assets/icon-192.png">
<title>VYBE</title>
<style>
:root{--pink:#ff2aa3;--violet:#925bff;--deep:#710044;--line:rgba(255,255,255,.27)}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html{background:#760047}
body{margin:0;min-height:100%;font-family:-apple-system,BlinkMacSystemFont,"SF Pro Display","Segoe UI",sans-serif;color:#fff;background:
radial-gradient(circle at 15% 0,#ff43ae 0,transparent 29%),
radial-gradient(circle at 100% 16%,#7b2c91 0,transparent 35%),
linear-gradient(180deg,#cc087b,#56063d);overscroll-behavior-y:none}
button{font:inherit;color:inherit}
.app{max-width:520px;margin:auto;min-height:100svh;padding:calc(env(safe-area-inset-top) + 9px) 10px calc(94px + env(safe-area-inset-bottom))}
.glass{background:linear-gradient(135deg,rgba(255,255,255,.20),rgba(255,255,255,.075));border:1px solid var(--line);box-shadow:0 20px 52px rgba(45,0,28,.28),inset 0 1px 0 rgba(255,255,255,.3);backdrop-filter:blur(24px) saturate(160%);-webkit-backdrop-filter:blur(24px) saturate(160%)}
.top{height:66px;position:sticky;top:calc(env(safe-area-inset-top) + 7px);z-index:30;border-radius:25px;display:flex;align-items:center;justify-content:space-between;padding:0 14px}
.brand{font-size:27px;font-weight:300;letter-spacing:4px}.topbutton{width:41px;height:41px;border:0;border-radius:15px;background:rgba(255,255,255,.14);font-size:20px}
.stories{display:flex;overflow-x:auto;gap:12px;padding:17px 4px 14px;scrollbar-width:none}.stories::-webkit-scrollbar{display:none}
.story{width:68px;flex:0 0 auto;text-align:center;font-size:11px;border:0;background:none;padding:0}
.ring{width:63px;height:63px;margin:auto;padding:3px;border-radius:50%;background:conic-gradient(#ffe779,#ff44ad,#a55fff,#ffe779)}
.avatar{width:100%;height:100%;border-radius:50%;border:3px solid #cc087b;background-size:cover;background-position:center}
.story span{display:block;margin-top:6px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.feed{display:grid;gap:17px}.card{border-radius:29px;overflow:hidden}
.head{display:flex;align-items:center;gap:10px;padding:12px 14px}.head .avatar{width:42px;height:42px;border:2px solid rgba(255,255,255,.72)}.meta{flex:1;min-width:0}.meta b{display:block;font-size:14px}.meta small{font-size:11px;opacity:.72}
.media{position:relative;aspect-ratio:4/5;overflow:hidden;background:#331026;touch-action:manipulation}.media img,.media video{width:100%;height:100%;object-fit:cover;display:block}.media video{background:#180015}
.badge{position:absolute;z-index:3;top:13px;left:13px;padding:8px 11px;border-radius:999px;background:rgba(18,0,12,.28);border:1px solid rgba(255,255,255,.35);font-size:11px;backdrop-filter:blur(13px)}
.mute{position:absolute;z-index:3;right:13px;top:13px;width:36px;height:36px;border:0;border-radius:14px;background:rgba(18,0,12,.35)}
.heartburst{position:absolute;z-index:5;inset:0;display:grid;place-items:center;font-size:86px;opacity:0;transform:scale(.35);pointer-events:none;text-shadow:0 10px 30px rgba(75,0,44,.4)}
.heartburst.show{animation:burst .65s ease}
@keyframes burst{35%{opacity:1;transform:scale(1.15)}70%{opacity:1;transform:scale(.95)}100%{opacity:0;transform:scale(1.2)}}
.actions{display:flex;align-items:center;gap:9px;padding:11px 13px 7px}.action{width:40px;height:40px;border:0;border-radius:15px;background:rgba(255,255,255,.13);font-size:20px}.action.liked{background:linear-gradient(145deg,#ff39aa,#ff7bc9)}.save{margin-left:auto}
.copy{font-size:13px;line-height:1.42;padding:0 15px 15px}.likes{font-weight:750;margin-bottom:6px}.caption b{margin-right:5px}.comments{opacity:.66;margin-top:6px}
.nav{position:fixed;z-index:40;left:50%;transform:translateX(-50%);bottom:calc(8px + env(safe-area-inset-bottom));width:min(calc(100% - 20px),500px);height:69px;border-radius:27px;display:flex;align-items:center;justify-content:space-around}.nav button{border:0;background:none;width:48px;height:48px;border-radius:17px;font-size:22px}.nav .active{background:linear-gradient(145deg,#ff36aa,#945cff)}
.storyview{position:fixed;z-index:100;inset:0;background:#15000f;display:none;align-items:center;justify-content:center}.storyview.open{display:flex}.storymedia{position:absolute;inset:0;width:100%;height:100%;object-fit:cover}.storyshade{position:absolute;inset:0;background:linear-gradient(180deg,rgba(0,0,0,.35),transparent 30%,transparent 70%,rgba(0,0,0,.45))}
.progress{position:absolute;top:calc(env(safe-area-inset-top) + 10px);left:10px;right:10px;height:3px;border-radius:4px;background:rgba(255,255,255,.3);overflow:hidden}.progress i{display:block;width:0;height:100%;background:#fff}.storyview.open .progress i{animation:progress 5s linear forwards}@keyframes progress{to{width:100%}}
.storyhead{position:absolute;top:calc(env(safe-area-inset-top) + 22px);left:15px;right:15px;display:flex;align-items:center;gap:10px}.storyhead .avatar{width:38px;height:38px}.storyhead b{font-size:13px}.close{margin-left:auto;width:40px;height:40px;border:0;border-radius:15px;background:rgba(0,0,0,.28);font-size:22px}
.toast{position:fixed;z-index:80;left:50%;bottom:104px;transform:translate(-50%,20px);opacity:0;background:rgba(20,0,13,.78);border:1px solid rgba(255,255,255,.2);border-radius:99px;padding:10px 15px;font-size:12px;backdrop-filter:blur(14px);transition:.22s}.toast.show{opacity:1;transform:translate(-50%,0)}
</style>
</head>
<body>
<div class="app">
<header class="top glass"><button class="topbutton">◉</button><div class="brand">VYBE</div><button class="topbutton">⌁</button></header>
<section class="stories" id="stories"></section>
<main class="feed" id="feed"></main>
</div>
<nav class="nav glass"><button class="active">⌂</button><button>⌕</button><button>＋</button><button>♡</button><button>◎</button></nav>
<div class="toast" id="toast">Salvato nella raccolta “Estate”</div>
<div class="storyview" id="storyview">
<img class="storymedia" id="storymedia"><div class="storyshade"></div><div class="progress"><i></i></div>
<div class="storyhead"><div class="avatar" id="storyavatar"></div><b id="storyname"></b><button class="close">×</button></div>
</div>
<script>
const people=[
["martina.ss","Positano, Italia","assets/beach_girl.jpg"],
["giuliabln","Mykonos, Grecia","assets/couple_sunset.jpg"],
["saraferrari","Neon Room, Milano","assets/club_close.jpg"],
["vale.sc","Formentera, Spagna","assets/friends_beach.jpg"],
["elena.m","Ibiza, Spagna","assets/beach_close.jpg"],
["aleeteo","Lisbona, Portogallo","assets/sunset_crop.jpg"]
];
const posts=[
["martina.ss","Positano, Italia","assets/beach_girl.jpg","vivi il momento 🧡",245],
["giuliabln","Mykonos, Grecia","assets/couple_sunset.jpg","you, me & sunsets 💗",387],
["saraferrari","Neon Room, Milano","video","same people, different night ✨",1022],
["vale.sc","Formentera, Spagna","assets/friends_beach.jpg","non tornerei mai 🌊",614],
["elena.m","Ibiza, Spagna","assets/beach_close.jpg","giorni che sembrano non finire mai",821],
["aleeteo","Lisbona, Portogallo","assets/sunset_crop.jpg","perdersi insieme è il piano",556],
["martina.ss","Amalfi, Italia","assets/beach_soft.jpg","out of office, finalmente",972],
["giuliabln","Paros, Grecia","assets/couple_close.jpg","la mia persona preferita",1184],
["vale.sc","Naxos, Grecia","assets/friends_crop.jpg","colazioni lente e zero programmi",743],
["saraferrari","Neon Room, Milano","assets/club_dark.jpg","last night was a blur",1309],
["elena.m","Formentera, Spagna","assets/friends_warm.jpg","solo noi e il mare",498],
["martina.ss","Positano, Italia","assets/beach_close.jpg","ancora cinque minuti",675]
];
const stories=document.getElementById("stories");
people.forEach((p,i)=>{
 let b=document.createElement("button");b.className="story";
 b.innerHTML=`<div class="ring"><div class="avatar" style="background-image:url('${p[2]}')"></div></div><span>${p[0]}</span>`;
 b.onclick=()=>openStory(p);stories.appendChild(b);
});
const feed=document.getElementById("feed");
posts.forEach((p,i)=>{
 const isVideo=p[2]==="video"; const avatar=people.find(x=>x[0]===p[0])?.[2]||"assets/beach_girl.jpg";
 const media=isVideo?`<video muted loop playsinline preload="metadata" poster="assets/club_scene.jpg"><source src="assets/club_loop.mp4" type="video/mp4"></video><button class="mute">♫</button>`:`<img src="${p[2]}" alt="">`;
 let card=document.createElement("article");card.className="card glass";
 card.innerHTML=`<div class="head"><div class="avatar" style="background-image:url('${avatar}')"></div><div class="meta"><b>${p[0]}</b><small>${p[1]}</small></div><span>•••</span></div>
 <div class="media">${media}<div class="badge">${p[1]}</div><div class="heartburst">♥</div></div>
 <div class="actions"><button class="action like">♡</button><button class="action">◯</button><button class="action">↗</button><button class="action save">⌑</button></div>
 <div class="copy"><div class="likes">${p[4].toLocaleString("it-IT")} Mi piace</div><div class="caption"><b>${p[0]}</b>${p[3]}</div><div class="comments">Visualizza tutti i ${18+i*6} commenti</div></div>`;
 feed.appendChild(card);
});
function toggleLike(card,force=true){
 const btn=card.querySelector(".like"), count=card.querySelector(".likes");
 const old=parseInt(count.textContent.replace(/\D/g,""),10), was=btn.classList.contains("liked");
 if(force && was)return;
 btn.classList.toggle("liked");btn.textContent=btn.classList.contains("liked")?"♥":"♡";
 count.textContent=(btn.classList.contains("liked")?old+1:old-1).toLocaleString("it-IT")+" Mi piace";
}
document.addEventListener("click",e=>{
 const like=e.target.closest(".like");if(like)toggleLike(like.closest(".card"),false);
 const save=e.target.closest(".save");if(save){save.textContent=save.textContent==="⌑"?"▣":"⌑";let t=document.getElementById("toast");t.classList.add("show");setTimeout(()=>t.classList.remove("show"),1200)}
 const mute=e.target.closest(".mute");if(mute){let v=mute.parentElement.querySelector("video");v.muted=!v.muted;mute.textContent=v.muted?"♫":"♪"}
 if(e.target.closest(".close")||e.target.id==="storyview")closeStory();
});
let lastTap=0;
document.addEventListener("pointerup",e=>{
 const media=e.target.closest(".media");if(!media)return;
 const now=Date.now();if(now-lastTap<330){let card=media.closest(".card");toggleLike(card,true);let h=media.querySelector(".heartburst");h.classList.remove("show");void h.offsetWidth;h.classList.add("show")}lastTap=now;
});
function openStory(p){let v=document.getElementById("storyview");document.getElementById("storymedia").src=p[2];document.getElementById("storyavatar").style.backgroundImage=`url('${p[2]}')`;document.getElementById("storyname").textContent=p[0];v.classList.add("open");setTimeout(closeStory,5000)}
function closeStory(){document.getElementById("storyview").classList.remove("open")}
const observer=new IntersectionObserver(entries=>entries.forEach(x=>{let v=x.target;if(x.isIntersecting)v.play().catch(()=>{});else v.pause()}),{threshold:.55});
document.querySelectorAll("video").forEach(v=>observer.observe(v));
if("serviceWorker" in navigator)window.addEventListener("load",()=>navigator.serviceWorker.register("sw.js"));
</script>
</body>
</html>
