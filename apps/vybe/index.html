<!doctype html>
<html lang="it">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover,user-scalable=no">
<meta name="theme-color" content="#F4EFE6">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="VYBE">
<link rel="stylesheet" href="../../core/design-tokens.css">
<title>VYBE</title>

<style>
:root{
  --pink:#ff2aa3;
  --violet:#8e58ff;
  --deep:#5d073f;
  --line:rgba(255,255,255,.26);
  --glass-a:rgba(255,255,255,.19);
  --glass-b:rgba(255,255,255,.07);
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html{background:#6a0045}
body{
  margin:0;
  min-height:100%;
  overflow-x:hidden;
  font-family:-apple-system,BlinkMacSystemFont,"SF Pro Display","Segoe UI",sans-serif;
  color:#fff;
  background:
    radial-gradient(circle at 15% 0,#ff43ae 0,transparent 28%),
    radial-gradient(circle at 100% 16%,#7b2c91 0,transparent 34%),
    linear-gradient(180deg,#cb087b,#53063c);
  overscroll-behavior-y:none;
}
button{font:inherit;color:inherit}
.app{
  max-width:520px;
  min-height:100svh;
  margin:auto;
  padding:calc(env(safe-area-inset-top) + 10px) 18px calc(96px + env(safe-area-inset-bottom));
  overflow-x:hidden;
}
.glass{
  background:linear-gradient(135deg,var(--glass-a),var(--glass-b));
  border:1px solid var(--line);
  box-shadow:0 20px 52px rgba(45,0,28,.28),inset 0 1px 0 rgba(255,255,255,.3);
  backdrop-filter:blur(24px) saturate(160%);
  -webkit-backdrop-filter:blur(24px) saturate(160%);
}
.topbar{
  position:sticky;
  top:calc(env(safe-area-inset-top) + 8px);
  z-index:30;
  height:64px;
  margin-bottom:12px;
  border-radius:25px;
  padding:0 14px;
  display:flex;
  align-items:center;
  justify-content:space-between;
}
.brand{
  font-size:28px;
  font-weight:300;
  letter-spacing:4px;
}
.top-button{
  width:41px;
  height:41px;
  border:0;
  border-radius:15px;
  background:rgba(255,255,255,.14);
  font-size:20px;
}
.stories{
  display:flex;
  gap:12px;
  width:100%;
  max-width:100%;
  margin:0 0 18px;
  padding:2px 0 4px;
  overflow-x:auto;
  overflow-y:hidden;
  scrollbar-width:none;
  -webkit-overflow-scrolling:touch;
  overscroll-behavior-x:contain;
}
.stories::-webkit-scrollbar{display:none}
.story{
  width:70px;
  min-width:70px;
  flex:0 0 70px;
  padding:0;
  border:0;
  background:none;
  text-align:center;
  font-size:11px;
}
.story-ring{
  width:62px;
  height:62px;
  margin:auto;
  padding:3px;
  border-radius:50%;
  background:conic-gradient(#ffe779,#ff44ad,#a55fff,#ffe779);
}
.avatar{
  width:100%;
  height:100%;
  border-radius:50%;
  border:3px solid #cc087b;
  background-size:cover;
  background-position:center;
}
.story span{
  display:block;
  margin-top:6px;
  white-space:nowrap;
  overflow:hidden;
  text-overflow:ellipsis;
}
.feed{
  display:grid;
  gap:17px;
  padding-top:2px;
  padding-bottom:calc(8px + env(safe-area-inset-bottom));
}
.card{
  border-radius:29px;
  overflow:hidden;
}
.card-head{
  display:flex;
  align-items:center;
  gap:10px;
  padding:12px 14px;
}
.card-head .avatar{
  width:42px;
  height:42px;
  border:2px solid rgba(255,255,255,.72);
}
.meta{
  flex:1;
  min-width:0;
}
.meta b{
  display:block;
  font-size:14px;
}
.meta small{
  font-size:11px;
  opacity:.72;
}
.media{
  position:relative;
  aspect-ratio:4/5;
  overflow:hidden;
  background:#331026;
  touch-action:manipulation;
}
.media img{
  width:100%;
  height:100%;
  display:block;
  object-fit:cover;
}
.location{
  position:absolute;
  top:13px;
  left:13px;
  z-index:3;
  padding:8px 11px;
  border-radius:999px;
  background:rgba(18,0,12,.28);
  border:1px solid rgba(255,255,255,.35);
  font-size:11px;
  backdrop-filter:blur(13px);
}
.heart-burst{
  position:absolute;
  inset:0;
  z-index:5;
  display:grid;
  place-items:center;
  font-size:88px;
  opacity:0;
  transform:scale(.35);
  pointer-events:none;
}
.heart-burst.show{animation:burst .65s ease}
@keyframes burst{
  35%{opacity:1;transform:scale(1.15)}
  70%{opacity:1;transform:scale(.95)}
  100%{opacity:0;transform:scale(1.2)}
}
.actions{
  display:flex;
  align-items:center;
  gap:9px;
  padding:11px 13px 7px;
}
.action{
  width:40px;
  height:40px;
  border:0;
  border-radius:15px;
  background:rgba(255,255,255,.13);
  font-size:20px;
}
.action.liked{
  background:linear-gradient(145deg,#ff39aa,#ff7bc9);
}
.save{margin-left:auto}
.copy{
  padding:0 15px 15px;
  font-size:13px;
  line-height:1.42;
}
.likes{
  font-weight:750;
  margin-bottom:6px;
}
.caption b{margin-right:5px}
.comments{
  margin-top:6px;
  opacity:.66;
}
.bottom-nav{
  position:fixed;
  left:50%;
  bottom:calc(8px + env(safe-area-inset-bottom));
  z-index:40;
  width:min(calc(100% - 20px),500px);
  height:69px;
  transform:translateX(-50%);
  border-radius:27px;
  display:flex;
  align-items:center;
  justify-content:space-around;
}
.bottom-nav button{
  width:48px;
  height:48px;
  border:0;
  border-radius:17px;
  background:none;
  font-size:22px;
}
.bottom-nav .active{
  background:linear-gradient(145deg,#ff36aa,#945cff);
}
.toast{
  position:fixed;
  left:50%;
  bottom:104px;
  z-index:80;
  transform:translate(-50%,20px);
  opacity:0;
  padding:10px 15px;
  border-radius:99px;
  background:rgba(20,0,13,.78);
  border:1px solid rgba(255,255,255,.2);
  font-size:12px;
  transition:.22s;
}
.toast.show{
  opacity:1;
  transform:translate(-50%,0);
}
.story-view{
  position:fixed;
  inset:0;
  z-index:100;
  display:none;
  background:#15000f;
}
.story-view.open{display:block}
.story-view img{
  width:100%;
  height:100%;
  object-fit:cover;
}
.story-shade{
  position:absolute;
  inset:0;
  background:linear-gradient(180deg,rgba(0,0,0,.32),transparent 30%,transparent 72%,rgba(0,0,0,.45));
}
.story-progress{
  position:absolute;
  top:calc(env(safe-area-inset-top) + 10px);
  left:10px;
  right:10px;
  height:3px;
  overflow:hidden;
  border-radius:4px;
  background:rgba(255,255,255,.3);
}
.story-progress i{
  display:block;
  width:0;
  height:100%;
  background:#fff;
}
.story-view.open .story-progress i{
  animation:progress 5s linear forwards;
}
@keyframes progress{to{width:100%}}
.story-close{
  position:absolute;
  top:calc(env(safe-area-inset-top) + 20px);
  right:15px;
  width:42px;
  height:42px;
  border:0;
  border-radius:15px;
  background:rgba(0,0,0,.35);
  font-size:22px;
}

.director-panel{position:fixed;inset:0;z-index:110;display:none;align-items:center;justify-content:center;background:rgba(18,0,12,.62);padding:calc(env(safe-area-inset-top) + 18px) 18px calc(env(safe-area-inset-bottom) + 18px)}.director-panel.open{display:flex}.director-card{width:min(460px,100%);max-height:calc(100dvh - 36px);overflow-y:auto;overscroll-behavior:contain;-webkit-overflow-scrolling:touch;border-radius:28px;padding:18px}.director-card h2{margin:0 0 12px}.director-card label{display:block;font-size:11px;opacity:.78;margin:9px 0 5px}.director-card input{width:100%;border:1px solid rgba(255,255,255,.18);outline:0;background:rgba(255,255,255,.10);border-radius:14px;padding:11px}.director-actions{display:flex;flex-wrap:wrap;gap:9px;margin-top:14px}.director-actions button{flex:1 1 130px;border:0;border-radius:14px;padding:11px}.director-actions .secondary{background:rgba(255,255,255,.12)}.director-actions .primary{background:linear-gradient(145deg,#ff36aa,#945cff)}.manual-paths{margin-top:10px}.manual-paths summary{cursor:pointer;font-size:12px;opacity:.78}

</style>
<link rel="stylesheet" href="../../core/app-theme.css">
</head>

<body class="pandrero-app pandrero-vybe">
<div class="app">
  <header class="topbar glass">
    <button class="top-button" aria-label="Fotocamera">◉</button>
    <div class="brand">VYBE</div>
    <button class="top-button" aria-label="Messaggi">⌁</button>
  </header>

  <section class="stories" id="stories"></section>
  <main class="feed" id="feed"></main>
</div>

<nav class="bottom-nav glass">
  <button class="active" aria-label="Home">⌂</button>
  <button aria-label="Cerca">⌕</button>
  <button id="createPostBtn" aria-label="Crea">＋</button>
  <button aria-label="Attività">♡</button>
  <button aria-label="Profilo">◎</button>
</nav>

<div class="toast" id="toast">Salvato nella raccolta “Estate”</div>

<div class="story-view" id="storyView">
  <img id="storyImage" alt="">
  <div class="story-shade"></div>
  <div class="story-progress"><i></i></div>
  <button class="story-close" id="storyClose">×</button>
</div>


<div class="director-panel" id="postPanel">
  <form class="director-card glass" id="postForm">
    <h2>Nuovo post VYBE</h2>
    <label>Username</label><input id="postUser" required>
    <label>Luogo</label><input id="postPlace" required>
    <label>Immagine o poster</label><div id="postImagePicker"></div>
    <label>Video (opzionale)</label><div id="postVideoPicker"></div>
    <details class="manual-paths"><summary>Percorso manuale</summary>
      <label>Immagine o poster manuale</label><input id="postImage" placeholder="assets/images/nuova.webp">
      <label>Video manuale (opzionale)</label><input id="postVideo" placeholder="assets/videos/nuovo.mp4">
    </details>
    <label>Caption</label><input id="postCaption" required>
    <label>Like iniziali</label><input id="postLikes" type="number" min="0" value="0">
    <div class="director-actions">
      <button type="button" class="secondary" id="resetPostsBtn">Ripristina contenuti iniziali</button>
      <button type="button" class="secondary" id="closePostPanel">Annulla</button>
      <button type="submit" class="primary">Aggiungi</button>
    </div>
  </form>
</div>

<script src="content.js"></script>
<script type="module" src="app.js"></script>
</body>
</html>
