<!doctype html>
<html lang="it">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover,user-scalable=no">
<meta name="theme-color" content="#d20a80">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="VYBE">
<title>VYBE</title>

<style>
:root{
  --pink:#ff2aa3;
  --violet:#8e58ff;
  --deep:#5d073f;
  --line:rgba(255,255,255,.26);
  --glass-a:rgba(255,255,255,.19);
  --glass-b:rgba(255,255,255,.07);
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html{background:#6a0045}
body{
  margin:0;
  min-height:100%;
  font-family:-apple-system,BlinkMacSystemFont,"SF Pro Display","Segoe UI",sans-serif;
  color:#fff;
  background:
    radial-gradient(circle at 15% 0,#ff43ae 0,transparent 28%),
    radial-gradient(circle at 100% 16%,#7b2c91 0,transparent 34%),
    linear-gradient(180deg,#cb087b,#53063c);
  overscroll-behavior-y:none;
}
button{font:inherit;color:inherit}
.app{
  max-width:520px;
  min-height:100svh;
  margin:auto;
  padding:calc(env(safe-area-inset-top) + 10px) 10px calc(94px + env(safe-area-inset-bottom));
}
.glass{
  background:linear-gradient(135deg,var(--glass-a),var(--glass-b));
  border:1px solid var(--line);
  box-shadow:0 20px 52px rgba(45,0,28,.28),inset 0 1px 0 rgba(255,255,255,.3);
  backdrop-filter:blur(24px) saturate(160%);
  -webkit-backdrop-filter:blur(24px) saturate(160%);
}
.topbar{
  position:sticky;
  top:calc(env(safe-area-inset-top) + 8px);
  z-index:30;
  height:66px;
  border-radius:25px;
  padding:0 14px;
  display:flex;
  align-items:center;
  justify-content:space-between;
}
.brand{
  font-size:28px;
  font-weight:300;
  letter-spacing:4px;
}
.top-button{
  width:41px;
  height:41px;
  border:0;
  border-radius:15px;
  background:rgba(255,255,255,.14);
  font-size:20px;
}
.stories{
  display:flex;
  gap:12px;
  overflow-x:auto;
  padding:17px 4px 14px;
  scrollbar-width:none;
}
.stories::-webkit-scrollbar{display:none}
.story{
  width:68px;
  flex:0 0 auto;
  padding:0;
  border:0;
  background:none;
  text-align:center;
  font-size:11px;
}
.story-ring{
  width:63px;
  height:63px;
  margin:auto;
  padding:3px;
  border-radius:50%;
  background:conic-gradient(#ffe779,#ff44ad,#a55fff,#ffe779);
}
.avatar{
  width:100%;
  height:100%;
  border-radius:50%;
  border:3px solid #cc087b;
  background-size:cover;
  background-position:center;
}
.story span{
  display:block;
  margin-top:6px;
  white-space:nowrap;
  overflow:hidden;
  text-overflow:ellipsis;
}
.feed{
  display:grid;
  gap:17px;
}
.card{
  border-radius:29px;
  overflow:hidden;
}
.card-head{
  display:flex;
  align-items:center;
  gap:10px;
  padding:12px 14px;
}
.card-head .avatar{
  width:42px;
  height:42px;
  border:2px solid rgba(255,255,255,.72);
}
.meta{
  flex:1;
  min-width:0;
}
.meta b{
  display:block;
  font-size:14px;
}
.meta small{
  font-size:11px;
  opacity:.72;
}
.media{
  position:relative;
  aspect-ratio:4/5;
  overflow:hidden;
  background:#331026;
  touch-action:manipulation;
}
.media img{
  width:100%;
  height:100%;
  display:block;
  object-fit:cover;
}
.location{
  position:absolute;
  top:13px;
  left:13px;
  z-index:3;
  padding:8px 11px;
  border-radius:999px;
  background:rgba(18,0,12,.28);
  border:1px solid rgba(255,255,255,.35);
  font-size:11px;
  backdrop-filter:blur(13px);
}
.heart-burst{
  position:absolute;
  inset:0;
  z-index:5;
  display:grid;
  place-items:center;
  font-size:88px;
  opacity:0;
  transform:scale(.35);
  pointer-events:none;
}
.heart-burst.show{animation:burst .65s ease}
@keyframes burst{
  35%{opacity:1;transform:scale(1.15)}
  70%{opacity:1;transform:scale(.95)}
  100%{opacity:0;transform:scale(1.2)}
}
.actions{
  display:flex;
  align-items:center;
  gap:9px;
  padding:11px 13px 7px;
}
.action{
  width:40px;
  height:40px;
  border:0;
  border-radius:15px;
  background:rgba(255,255,255,.13);
  font-size:20px;
}
.action.liked{
  background:linear-gradient(145deg,#ff39aa,#ff7bc9);
}
.save{margin-left:auto}
.copy{
  padding:0 15px 15px;
  font-size:13px;
  line-height:1.42;
}
.likes{
  font-weight:750;
  margin-bottom:6px;
}
.caption b{margin-right:5px}
.comments{
  margin-top:6px;
  opacity:.66;
}
.bottom-nav{
  position:fixed;
  left:50%;
  bottom:calc(8px + env(safe-area-inset-bottom));
  z-index:40;
  width:min(calc(100% - 20px),500px);
  height:69px;
  transform:translateX(-50%);
  border-radius:27px;
  display:flex;
  align-items:center;
  justify-content:space-around;
}
.bottom-nav button{
  width:48px;
  height:48px;
  border:0;
  border-radius:17px;
  background:none;
  font-size:22px;
}
.bottom-nav .active{
  background:linear-gradient(145deg,#ff36aa,#945cff);
}
.toast{
  position:fixed;
  left:50%;
  bottom:104px;
  z-index:80;
  transform:translate(-50%,20px);
  opacity:0;
  padding:10px 15px;
  border-radius:99px;
  background:rgba(20,0,13,.78);
  border:1px solid rgba(255,255,255,.2);
  font-size:12px;
  transition:.22s;
}
.toast.show{
  opacity:1;
  transform:translate(-50%,0);
}
.story-view{
  position:fixed;
  inset:0;
  z-index:100;
  display:none;
  background:#15000f;
}
.story-view.open{display:block}
.story-view img{
  width:100%;
  height:100%;
  object-fit:cover;
}
.story-shade{
  position:absolute;
  inset:0;
  background:linear-gradient(180deg,rgba(0,0,0,.32),transparent 30%,transparent 72%,rgba(0,0,0,.45));
}
.story-progress{
  position:absolute;
  top:calc(env(safe-area-inset-top) + 10px);
  left:10px;
  right:10px;
  height:3px;
  overflow:hidden;
  border-radius:4px;
  background:rgba(255,255,255,.3);
}
.story-progress i{
  display:block;
  width:0;
  height:100%;
  background:#fff;
}
.story-view.open .story-progress i{
  animation:progress 5s linear forwards;
}
@keyframes progress{to{width:100%}}
.story-close{
  position:absolute;
  top:calc(env(safe-area-inset-top) + 20px);
  right:15px;
  width:42px;
  height:42px;
  border:0;
  border-radius:15px;
  background:rgba(0,0,0,.35);
  font-size:22px;
}
</style>
</head>

<body>
<div class="app">
  <header class="topbar glass">
    <button class="top-button" aria-label="Fotocamera">◉</button>
    <div class="brand">VYBE</div>
    <button class="top-button" aria-label="Messaggi">⌁</button>
  </header>

  <section class="stories" id="stories"></section>
  <main class="feed" id="feed"></main>
</div>

<nav class="bottom-nav glass">
  <button class="active" aria-label="Home">⌂</button>
  <button aria-label="Cerca">⌕</button>
  <button aria-label="Crea">＋</button>
  <button aria-label="Attività">♡</button>
  <button aria-label="Profilo">◎</button>
</nav>

<div class="toast" id="toast">Salvato nella raccolta “Estate”</div>

<div class="story-view" id="storyView">
  <img id="storyImage" alt="">
  <div class="story-shade"></div>
  <div class="story-progress"><i></i></div>
  <button class="story-close" id="storyClose">×</button>
</div>

<script>
const people = [
  { user:"martina.ss", image:"assets/images/01_positano.webp" },
  { user:"giuliabln", image:"assets/images/02_couple_trip.webp" },
  { user:"vale.sc", image:"assets/images/03_girls_dinner.webp" },
  { user:"sofiatravels", image:"assets/images/04_rooftop_aperitivo.webp" },
  { user:"chiara.dee", image:"assets/images/06_airport.webp" },
  { user:"aleeteo", image:"assets/images/10_roadtrip.webp" }
];

const posts = [
  {
    user:"martina.ss",
    place:"Positano, Italia",
    image:"assets/images/01_positano.webp",
    caption:"Giorni che sanno d'estate ☀️",
    likes:845
  },
  {
    user:"giuliabln",
    place:"Mykonos, Grecia",
    image:"assets/images/02_couple_trip.webp",
    caption:"you, me & sunsets 🤍",
    likes:1287
  },
  {
    user:"vale.sc",
    place:"Roma, Italia",
    image:"assets/images/03_girls_dinner.webp",
    caption:"Le mie persone preferite ✨",
    likes:963
  },
  {
    user:"sofiatravels",
    place:"Firenze, Italia",
    image:"assets/images/04_rooftop_aperitivo.webp",
    caption:"Golden hour aperitivo 🥂",
    likes:714
  },
  {
    user:"chiara.dee",
    place:"Milano Malpensa",
    image:"assets/images/06_airport.webp",
    caption:"Next destination ✈️",
    likes:1104
  },
  {
    user:"aleeteo",
    place:"Costa Amalfitana",
    image:"assets/images/10_roadtrip.webp",
    caption:"No plans, just roads 🚗",
    likes:688
  }
];

const storiesEl = document.getElementById("stories");
const feedEl = document.getElementById("feed");
const toastEl = document.getElementById("toast");
const storyView = document.getElementById("storyView");
const storyImage = document.getElementById("storyImage");

function formatNumber(value){
  return value.toLocaleString("it-IT");
}

function renderStories(){
  storiesEl.innerHTML = people.map(person => `
    <button class="story" data-image="${person.image}" aria-label="Apri storia di ${person.user}">
      <div class="story-ring">
        <div class="avatar" style="background-image:url('${person.image}')"></div>
      </div>
      <span>${person.user}</span>
    </button>
  `).join("");
}

function renderFeed(){
  feedEl.innerHTML = posts.map((post,index) => `
    <article class="card glass">
      <div class="card-head">
        <div class="avatar" style="background-image:url('${post.image}')"></div>
        <div class="meta">
          <b>${post.user}</b>
          <small>${post.place}</small>
        </div>
        <span>•••</span>
      </div>

      <div class="media">
        <img src="${post.image}" alt="">
        <div class="location">${post.place}</div>
        <div class="heart-burst">♥</div>
      </div>

      <div class="actions">
        <button class="action like" aria-label="Mi piace">♡</button>
        <button class="action" aria-label="Commenta">◯</button>
        <button class="action" aria-label="Condividi">↗</button>
        <button class="action save" aria-label="Salva">⌑</button>
      </div>

      <div class="copy">
        <div class="likes">${formatNumber(post.likes)} Mi piace</div>
        <div class="caption"><b>${post.user}</b>${post.caption}</div>
        <div class="comments">Visualizza tutti i ${18 + index * 7} commenti</div>
      </div>
    </article>
  `).join("");
}

function toggleLike(card, forceLike = false){
  const button = card.querySelector(".like");
  const counter = card.querySelector(".likes");
  const isLiked = button.classList.contains("liked");

  if(forceLike && isLiked) return;

  const current = parseInt(counter.textContent.replace(/\D/g,""),10);
  button.classList.toggle("liked");
  button.textContent = button.classList.contains("liked") ? "♥" : "♡";
  counter.textContent =
    formatNumber(button.classList.contains("liked") ? current + 1 : current - 1)
    + " Mi piace";
}

function showToast(){
  toastEl.classList.add("show");
  setTimeout(() => toastEl.classList.remove("show"),1200);
}

function openStory(image){
  storyImage.src = image;
  storyView.classList.add("open");
  setTimeout(closeStory,5000);
}

function closeStory(){
  storyView.classList.remove("open");
}

document.addEventListener("click",event => {
  const like = event.target.closest(".like");
  if(like) toggleLike(like.closest(".card"));

  const save = event.target.closest(".save");
  if(save){
    save.textContent = save.textContent === "⌑" ? "▣" : "⌑";
    showToast();
  }

  const story = event.target.closest(".story");
  if(story) openStory(story.dataset.image);

  if(event.target.id === "storyClose" || event.target.id === "storyView"){
    closeStory();
  }
});

let lastTap = 0;
document.addEventListener("pointerup",event => {
  const media = event.target.closest(".media");
  if(!media) return;

  const now = Date.now();
  if(now - lastTap < 330){
    const card = media.closest(".card");
    toggleLike(card,true);

    const heart = media.querySelector(".heart-burst");
    heart.classList.remove("show");
    void heart.offsetWidth;
    heart.classList.add("show");
  }
  lastTap = now;
});

renderStories();
renderFeed();
</script>
</body>
</html>
