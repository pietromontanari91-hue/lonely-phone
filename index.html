<!doctype html>
<html lang="it">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover,user-scalable=no">
<meta name="theme-color" content="#000000">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Almost Phone">
<title>Almost Phone</title>
<link rel="icon" type="image/png" sizes="32x32" href="assets/icons/favicon.png">
<link rel="icon" type="image/png" sizes="192x192" href="assets/icons/icon-192.png">
<link rel="apple-touch-icon" href="assets/icons/apple-touch-icon.png">
<style>
:root{--pink:#ff2aa3;--violet:#8e58ff;--line:rgba(255,255,255,.28)}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{margin:0;width:100%;height:100%;overflow:hidden;font-family:-apple-system,BlinkMacSystemFont,"SF Pro Display","Segoe UI",sans-serif;color:#fff;background:#000}
button,input,select{font:inherit;color:inherit}
.phone{position:relative;width:100%;height:100dvh;max-width:520px;margin:auto;overflow:hidden;background:#000}
.screen{position:absolute;inset:0;display:none}.screen.active{display:block}
#standby{background:#000}
#lockscreen,#home{background:radial-gradient(circle at 20% 0,rgba(255,58,169,.9) 0,transparent 31%),radial-gradient(circle at 92% 16%,rgba(118,48,145,.88) 0,transparent 35%),linear-gradient(180deg,#b60b72 0%,#8d075d 45%,#4b072f 100%)}
.lock-content{height:100%;padding:calc(env(safe-area-inset-top) + 18px) 18px calc(env(safe-area-inset-bottom) + 18px)}
.lock-top{text-align:center;margin-top:16px}.lock-time{font-size:82px;font-weight:200;letter-spacing:-5px;line-height:.95}.lock-date{margin-top:10px;font-size:17px;opacity:.78}
.notifications{margin-top:42px;display:grid;gap:10px}
.notification{display:flex;align-items:center;gap:12px;padding:13px 14px;border-radius:22px;background:linear-gradient(135deg,rgba(255,255,255,.20),rgba(255,255,255,.08));border:1px solid rgba(255,255,255,.25);backdrop-filter:blur(22px) saturate(160%);box-shadow:0 16px 35px rgba(35,0,25,.24)}
.notif-icon{width:44px;height:44px;border-radius:15px;display:grid;place-items:center;font-weight:700;flex:0 0 auto}.notif-icon.texty{background:linear-gradient(145deg,#ff6ac0,#d23eb4)}.notif-icon.callsy{background:linear-gradient(145deg,#35d879,#129a55)}.notif-icon.vybe{background:linear-gradient(145deg,#ff44ae,#8657ff)}
.notif-copy{min-width:0;flex:1}.notif-copy b{display:block;font-size:13px}.notif-copy p{margin:3px 0 0;font-size:12px;opacity:.76;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}.notif-time{font-size:10px;opacity:.6}
.lock-bottom{position:absolute;left:18px;right:18px;bottom:calc(env(safe-area-inset-bottom) + 20px)}.quick-row{display:flex;justify-content:space-between}.quick{width:54px;height:54px;border-radius:50%;border:0;background:rgba(20,0,14,.32);font-size:22px}.swipe{text-align:center;margin-top:16px;font-size:12px;opacity:.72}
.home-inner{height:100%;padding:calc(env(safe-area-inset-top) + 10px) 18px calc(env(safe-area-inset-bottom) + 14px);display:flex;flex-direction:column}
.statusbar{display:flex;justify-content:space-between;padding:0 3px 18px;font-size:15px;font-weight:700}.header h1{margin:0;font-size:36px;letter-spacing:-1.4px}.header p{margin:8px 0 0;font-size:14px;opacity:.72}
.grid{display:grid;grid-template-columns:repeat(4,1fr);gap:26px 12px;margin-top:38px}.app-link{text-decoration:none;color:#fff;text-align:center;font-size:13px}
.icon{width:76px;height:76px;margin:0 auto 9px;border-radius:23px;display:grid;place-items:center;font-size:31px;font-weight:700;border:1px solid var(--line);box-shadow:0 18px 40px rgba(35,0,25,.28),inset 0 1px 0 rgba(255,255,255,.32)}
.icon.vybe{background:linear-gradient(145deg,#ff44ae,#8657ff)}.icon.texty{background:linear-gradient(145deg,#ff6ac0,#d23eb4)}.icon.callsy{background:linear-gradient(145deg,#35d879,#129a55)}.icon.pulse{background:linear-gradient(145deg,#8f66ff,#4d35d4)}.icon.travels{background:linear-gradient(145deg,#5fcfff,#5b7dff)}
.icon.lensy{
  background:
    url("assets/icons/icon-512.png") center/cover no-repeat,
    linear-gradient(145deg,#0b7ec7,#5a45d8,#d6008f);
}.icon.disabled{background:linear-gradient(145deg,rgba(255,255,255,.26),rgba(255,255,255,.08));opacity:.38}
.spacer{flex:1}.dock{height:92px;border-radius:31px;display:flex;align-items:center;justify-content:space-around;padding:0 10px;background:linear-gradient(135deg,rgba(255,255,255,.22),rgba(255,255,255,.08));border:1px solid rgba(255,255,255,.30);backdrop-filter:blur(26px) saturate(170%)}.dock .icon{width:66px;height:66px;margin:0;border-radius:21px;font-size:27px}
.slide-up{animation:slideUp .48s cubic-bezier(.2,.8,.2,1)}@keyframes slideUp{from{transform:translateY(100%);filter:blur(8px);opacity:.4}to{transform:translateY(0);filter:blur(0);opacity:1}}
.director-hit{position:fixed;right:0;top:0;width:90px;height:90px;z-index:80;opacity:0}
.panel{position:fixed;inset:0;z-index:100;display:none;align-items:center;justify-content:center;background:rgba(0,0,0,.72);padding:20px}.panel.open{display:flex}
.panel-card{width:min(460px,100%);max-height:90dvh;overflow:auto;border-radius:28px;padding:18px;background:linear-gradient(135deg,rgba(255,255,255,.20),rgba(255,255,255,.08));border:1px solid rgba(255,255,255,.24);backdrop-filter:blur(24px)}
.panel-head{display:flex;justify-content:space-between;align-items:center}.panel-head h2{margin:0;font-size:20px}.close{width:40px;height:40px;border:0;border-radius:14px;background:rgba(255,255,255,.12)}
.field{margin:12px 0}.field label{display:block;font-size:11px;opacity:.72;margin-bottom:5px}.field input,.field select{width:100%;border:1px solid rgba(255,255,255,.14);outline:0;background:rgba(255,255,255,.08);border-radius:15px;padding:12px}
.primary,.secondary{width:100%;border:0;border-radius:15px;padding:12px;margin-top:8px}.primary{background:linear-gradient(145deg,var(--pink),var(--violet))}.secondary{background:rgba(255,255,255,.10)}

.notification.scheduled-in{
  animation:scheduledNotifIn .55s cubic-bezier(.2,.9,.2,1);
}
@keyframes scheduledNotifIn{
  from{transform:translateY(-28px) scale(.96);opacity:0;filter:blur(5px)}
  to{transform:translateY(0) scale(1);opacity:1;filter:blur(0)}
}
</style>
</head>
<body>
<div class="phone">
<section id="standby" class="screen active"></section>
<section id="lockscreen" class="screen">
  <div class="lock-content">
    <div class="lock-top"><div class="lock-time" id="lockTime">09:41</div><div class="lock-date" id="lockDate">Venerdì 10 luglio</div></div>
    <div class="notifications" id="notifications"></div>
    <div class="lock-bottom"><div class="quick-row"><button class="quick">◉</button><button class="quick">◎</button></div><div class="swipe">Scorri verso l’alto per sbloccare</div></div>
  </div>
</section>
<section id="home" class="screen">
  <div class="home-inner">
    <div class="statusbar"><span id="homeTime">09:41</span><span>●●● ᯤ ▰</span></div>
    <section class="header"><h1>Buongiorno</h1><p>Almost Phone</p></section>
    <section class="grid">
      <a class="app-link" href="apps/vybe/index.html"><div class="icon vybe">V</div><span>VYBE</span></a>
      <a class="app-link" href="apps/texty/index.html"><div class="icon texty">T</div><span>Texty</span></a>
      <a class="app-link" href="apps/callsy/index.html"><div class="icon callsy">☎</div><span>Callsy</span></a>
      <div class="app-link"><div class="icon disabled">D</div><span>Draft</span></div>
      <a class="app-link" href="apps/travels/index.html"><div class="icon travels">✈</div><span>Travels</span></a>
      <a class="app-link" href="apps/lensy/index.html"><div class="icon lensy"></div><span>Lensy</span></a>
      <a class="app-link" href="apps/pulse/index.html"><div class="icon pulse">♪</div><span>Pulse</span></a>
      <div class="app-link"><div class="icon disabled">⚙</div><span>Settings</span></div>
    </section>
    <div class="spacer"></div>
    <nav class="dock">
      <a class="app-link" href="apps/vybe/index.html"><div class="icon vybe">V</div></a>
      <a class="app-link" href="apps/texty/index.html"><div class="icon texty">T</div></a>
      <a class="app-link" href="apps/callsy/index.html"><div class="icon callsy">☎</div></a>
      <a class="app-link" href="apps/lensy/index.html"><div class="icon lensy"></div></a>
    </nav>
  </div>
</section>
</div>

<button class="director-hit" id="directorHit"></button>

<div class="panel" id="panel">
<div class="panel-card">
  <div class="panel-head"><h2>Regia lock screen</h2><button class="close" id="closePanel">×</button></div>
  <div class="field"><label>Ora personalizzata</label><input id="customTime" placeholder="09:41"></div>
  <div class="field"><label>Data personalizzata</label><input id="customDate" placeholder="Venerdì 10 luglio"></div>
  <div class="field"><label>App</label><select id="notifApp"><option value="texty">Texty</option><option value="callsy">Callsy</option><option value="vybe">VYBE</option></select></div>
  <div class="field"><label>Titolo</label><input id="notifTitle" placeholder="Martina"></div>
  <div class="field"><label>Testo</label><input id="notifText" placeholder="Dove sei?"></div>
  <div class="field">
    <label>Ritardo</label>
    <select id="notifDelay">
      <option value="3">3 secondi</option>
      <option value="5">5 secondi</option>
      <option value="10" selected>10 secondi</option>
      <option value="15">15 secondi</option>
      <option value="30">30 secondi</option>
    </select>
  </div>
  <button class="primary" id="scheduleNotif">Programma notifica</button>
  <button class="secondary" id="addNotif">Mostra subito</button>
  <button class="secondary" id="cancelNotif">Annulla notifica programmata</button>
  <div class="field"><label>Stato</label><input id="notifCountdown" value="Nessuna notifica programmata" readonly></div>
  <button class="secondary" id="clearNotifs">Rimuovi tutte le notifiche</button>
  <button class="secondary" id="showLock">Mostra lock screen</button>
  <button class="secondary" id="showHome">Mostra Home</button>
  <button class="secondary" id="showStandby">Torna a schermo nero</button>
</div>
</div>

<script>
const $=id=>document.getElementById(id);
const screens={standby:$("standby"),lockscreen:$("lockscreen"),home:$("home")};
let scheduledNotificationTimer=null;
let scheduledNotificationTicker=null;
let notifications=JSON.parse(localStorage.getItem("lockNotifications")||"null")||[
 {app:"texty",title:"Martina",text:"Dove sei?",time:"ora"},
 {app:"callsy",title:"Chiamata persa",text:"Martina • 1 minuto fa",time:"1 min"},
 {app:"vybe",title:"VYBE",text:"3 nuove foto",time:"2 min"}
];

function showScreen(name,animated=false){
 Object.values(screens).forEach(s=>s.classList.remove("active","slide-up"));
 screens[name].classList.add("active");
 if(animated)screens[name].classList.add("slide-up");
}
function updateClock(){
 const now=new Date();
 const time=localStorage.getItem("lockTime")||now.toLocaleTimeString("it-IT",{hour:"2-digit",minute:"2-digit"});
 const date=localStorage.getItem("lockDate")||now.toLocaleDateString("it-IT",{weekday:"long",day:"numeric",month:"long"});
 $("lockTime").textContent=time;$("homeTime").textContent=time;$("lockDate").textContent=date;
}
function appLink(app){return app==="texty"?"apps/texty/index.html":app==="callsy"?"apps/callsy/index.html":"apps/vybe/index.html"}
function renderNotifications(animateFirst=false){
 $("notifications").innerHTML=notifications.map((n,index)=>`<div class="notification ${animateFirst&&index===0?"scheduled-in":""}" data-app="${n.app}"><div class="notif-icon ${n.app}">${n.app==="texty"?"T":n.app==="callsy"?"☎":"V"}</div><div class="notif-copy"><b>${n.title}</b><p>${n.text}</p></div><span class="notif-time">${n.time||"ora"}</span></div>`).join("");
 localStorage.setItem("lockNotifications",JSON.stringify(notifications));
}
updateClock();setInterval(updateClock,30000);renderNotifications();

screens.standby.onclick=()=>showScreen("lockscreen",true);
document.addEventListener("click",e=>{const n=e.target.closest(".notification");if(n)location.href=appLink(n.dataset.app)});

let startY=0;
screens.lockscreen.addEventListener("touchstart",e=>startY=e.touches[0].clientY,{passive:true});
screens.lockscreen.addEventListener("touchend",e=>{if(startY-e.changedTouches[0].clientY>55)showScreen("home",true)},{passive:true});

let taps=0,tapTimer=null;
screens.lockscreen.addEventListener("pointerup",()=>{taps++;clearTimeout(tapTimer);if(taps>=4){$("panel").classList.add("open");taps=0}tapTimer=setTimeout(()=>taps=0,1200)});

$("directorHit").onclick=()=>$("panel").classList.add("open");
$("closePanel").onclick=()=>$("panel").classList.remove("open");
function getNotificationFromPanel(){
 return {
   app:$("notifApp").value,
   title:$("notifTitle").value.trim()||"Nuova notifica",
   text:$("notifText").value.trim()||"Nuovo messaggio",
   time:"ora"
 };
}

$("addNotif").onclick=()=>{
 notifications.unshift(getNotificationFromPanel());
 renderNotifications(true);
};

$("scheduleNotif").onclick=()=>{
 clearTimeout(scheduledNotificationTimer);
 clearInterval(scheduledNotificationTicker);

 const notification=getNotificationFromPanel();
 const seconds=Number($("notifDelay").value);
 const target=Date.now()+seconds*1000;

 $("panel").classList.remove("open");
 showScreen("lockscreen",true);

 scheduledNotificationTicker=setInterval(()=>{
   const left=Math.max(0,Math.ceil((target-Date.now())/1000));
   $("notifCountdown").value=left>0?`Notifica tra ${left} secondi`:"Notifica in arrivo";
   if(left<=0)clearInterval(scheduledNotificationTicker);
 },200);

 scheduledNotificationTimer=setTimeout(()=>{
   notifications.unshift(notification);
   renderNotifications(true);
   $("notifCountdown").value="Notifica mostrata";
   if(navigator.vibrate)navigator.vibrate([180,90,180]);
 },seconds*1000);
};

$("cancelNotif").onclick=()=>{
 clearTimeout(scheduledNotificationTimer);
 clearInterval(scheduledNotificationTicker);
 $("notifCountdown").value="Notifica annullata";
};

$("clearNotifs").onclick=()=>{notifications=[];renderNotifications()};
$("customTime").onchange=e=>{localStorage.setItem("lockTime",e.target.value.trim());updateClock()};
$("customDate").onchange=e=>{localStorage.setItem("lockDate",e.target.value.trim());updateClock()};
$("showLock").onclick=()=>{$("panel").classList.remove("open");showScreen("lockscreen",true)};
$("showHome").onclick=()=>{$("panel").classList.remove("open");showScreen("home",true)};
$("showStandby").onclick=()=>{$("panel").classList.remove("open");showScreen("standby")};
</script>
</body>
</html>
