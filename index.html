<!doctype html>
<html lang="it">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover,user-scalable=no">
<meta name="theme-color" content="#000000">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Almost Phone">
<title>Almost Phone</title>
<link rel="icon" type="image/png" sizes="32x32" href="assets/icons/favicon.png">
<link rel="icon" type="image/png" sizes="192x192" href="assets/icons/icon-192.png">
<link rel="apple-touch-icon" href="assets/icons/apple-touch-icon.png">
<link rel="manifest" href="manifest.webmanifest">
<link rel="stylesheet" href="core/design-tokens.css">
<link rel="stylesheet" href="core/shell.css">
</head>
<body>
<div class="phone">
<section id="standby" class="screen active"></section>
<section id="lockscreen" class="screen">
  <div class="lock-content">
    <div class="lock-top"><div class="lock-time" id="lockTime">09:41</div><div class="lock-date" id="lockDate">Venerdì 10 luglio</div></div>
    <div class="notifications" id="notifications"></div>
    <div class="lock-bottom"><div class="quick-row"><button class="quick">◉</button><button class="quick">◎</button></div><div class="swipe">Scorri verso l’alto per sbloccare</div></div>
  </div>
</section>
<section id="home" class="screen">
  <div class="home-inner">
    <div class="statusbar"><span id="homeTime">09:41</span><span>●●● ᯤ ▰</span></div>
    <section class="header"><h1>Buongiorno</h1><p>Almost Phone</p></section>
    <section class="grid">
      <a class="app-link" href="apps/vybe/index.html"><div class="icon vybe"><svg viewBox="0 0 24 24" aria-hidden="true"><path d="M6 7l5 10L18 5"/><path d="M14 17h4"/></svg></div><span>VYBE</span></a>
      <a class="app-link" href="apps/texty/index.html"><div class="icon texty"><svg viewBox="0 0 24 24" aria-hidden="true"><path d="M5 6.5h14v9H9l-4 3v-12z"/><path d="M8 10h8M8 13h5"/></svg></div><span>Texty</span></a>
      <a class="app-link" href="apps/callsy/index.html"><div class="icon callsy"><svg viewBox="0 0 24 24" aria-hidden="true"><path d="M8 5l2.2 4-1.7 1.5c1.2 2.5 2.8 4.1 5.1 5.1l1.6-1.8 3.8 2.3c-.3 1.8-1.6 3-3.4 3C10.3 19.1 4.9 13.7 4.9 8.4 4.9 6.6 6.2 5.3 8 5z"/></svg></div><span>Callsy</span></a>
      <a class="app-link" href="apps/inbox/index.html"><div class="icon inbox"><svg viewBox="0 0 24 24" aria-hidden="true"><path d="M4.5 7.5h15v10h-15z"/><path d="M5 8l7 5 7-5"/></svg></div><span>Inbox</span></a>
      <a class="app-link" href="apps/travels/index.html"><div class="icon travels"><svg viewBox="0 0 24 24" aria-hidden="true"><path d="M3.5 13l17-7-7 17-2.2-7.7L3.5 13z"/></svg></div><span>Travels</span></a>
      <a class="app-link" href="apps/lensy/index.html"><div class="icon lensy"></div><span>Lensy</span></a>
      <a class="app-link" href="apps/pulse/index.html"><div class="icon pulse"><svg viewBox="0 0 24 24" aria-hidden="true"><path d="M5 13h3l2-6 4 11 2-5h3"/></svg></div><span>Pulse</span></a>
      <div class="app-link"><div class="icon disabled"><svg viewBox="0 0 24 24" aria-hidden="true"><path d="M12 8.5a3.5 3.5 0 100 7 3.5 3.5 0 000-7z"/><path d="M12 3.5v3M12 17.5v3M4.6 7.2l2.1 2.1M17.3 14.7l2.1 2.1M3.5 12h3M17.5 12h3M4.6 16.8l2.1-2.1M17.3 9.3l2.1-2.1"/></svg></div><span>Settings</span></div>
    </section>
    <div class="spacer"></div>
    <nav class="dock">
      <a class="app-link" href="apps/vybe/index.html"><div class="icon vybe"><svg viewBox="0 0 24 24" aria-hidden="true"><path d="M6 7l5 10L18 5"/><path d="M14 17h4"/></svg></div></a>
      <a class="app-link" href="apps/texty/index.html"><div class="icon texty"><svg viewBox="0 0 24 24" aria-hidden="true"><path d="M5 6.5h14v9H9l-4 3v-12z"/><path d="M8 10h8M8 13h5"/></svg></div></a>
      <a class="app-link" href="apps/callsy/index.html"><div class="icon callsy"><svg viewBox="0 0 24 24" aria-hidden="true"><path d="M8 5l2.2 4-1.7 1.5c1.2 2.5 2.8 4.1 5.1 5.1l1.6-1.8 3.8 2.3c-.3 1.8-1.6 3-3.4 3C10.3 19.1 4.9 13.7 4.9 8.4 4.9 6.6 6.2 5.3 8 5z"/></svg></div></a>
      <a class="app-link" href="apps/lensy/index.html"><div class="icon lensy"></div></a>
    </nav>
  </div>
</section>
</div>

<button class="director-hit" id="directorHit"></button>

<div class="panel" id="panel">
<div class="panel-card">
  <div class="panel-head"><h2>Regia lock screen</h2><button class="close" id="closePanel">×</button></div>
  <div class="field"><label>Ora personalizzata</label><input id="customTime" placeholder="09:41"></div>
  <div class="field"><label>Data personalizzata</label><input id="customDate" placeholder="Venerdì 10 luglio"></div>
  <div class="field"><label>App</label><select id="notifApp"><option value="texty">Texty</option><option value="callsy">Callsy</option><option value="vybe">VYBE</option><option value="inbox">Inbox</option></select></div>
  <div class="field"><label>Titolo</label><input id="notifTitle" placeholder="Martina"></div>
  <div class="field"><label>Testo</label><input id="notifText" placeholder="Dove sei?"></div>
  <div class="field">
    <label>Ritardo</label>
    <select id="notifDelay">
      <option value="3">3 secondi</option>
      <option value="5">5 secondi</option>
      <option value="10" selected>10 secondi</option>
      <option value="15">15 secondi</option>
      <option value="30">30 secondi</option>
    </select>
  </div>
  <button class="primary" id="scheduleNotif">Programma notifica</button>
  <button class="secondary" id="scheduleInterlineeEmail">Programma email Interlinee</button>
  <button class="secondary" id="resetInterlineeEmail">Reset Interlinee</button>
  <button class="secondary" id="addNotif">Mostra subito</button>
  <button class="secondary" id="cancelNotif">Annulla notifica programmata</button>
  <div class="field"><label>Stato</label><input id="notifCountdown" value="Nessuna notifica programmata" readonly></div>
  <button class="secondary" id="clearNotifs">Rimuovi tutte le notifiche</button>
  <button class="secondary" id="showLock">Mostra lock screen</button>
  <button class="secondary" id="showHome">Mostra Home</button>
  <button class="secondary" id="showStandby">Torna a schermo nero</button>
</div>
</div>

<script type="module">
import { $, createScreenController } from "./core/dom.js";
import { readJSON, writeJSON } from "./core/storage.js";
import { italianClockParts } from "./core/time.js";
import { defaultLockNotifications, notificationApps } from "./data/home.js";
import { interlineeEmail, removeUndeliveredInterlineeSeed, resetInterlineeDelivery, scheduleEmailDelivery } from "./core/emailScheduler.js";
import { startSchedulerRunner } from "./core/schedulerRunner.js";

const screens={standby:$("standby"),lockscreen:$("lockscreen"),home:$("home")};
const showScreen=createScreenController(screens);
let scheduledNotificationTimer=null;
let scheduledNotificationTicker=null;
removeUndeliveredInterlineeSeed();
let notifications=readJSON("lockNotifications",null)||defaultLockNotifications;

function updateClock(){
 const now=italianClockParts();
 const time=localStorage.getItem("lockTime")||now.time;
 const date=localStorage.getItem("lockDate")||now.date;
 $("lockTime").textContent=time;$("homeTime").textContent=time;$("lockDate").textContent=date;
}
function appLink(app, href){return href||notificationApps[app]?.href||notificationApps.vybe.href}
function notificationIcon(app){return notificationApps[app]?.icon||notificationApps.vybe.icon}
function renderNotifications(animateFirst=false){
 $("notifications").innerHTML=notifications.map((n,index)=>`<div class="notification ${animateFirst&&index===0?"scheduled-in":""}" data-app="${n.app}" data-href="${n.href||''}"><div class="notif-icon ${n.app}">${notificationIcon(n.app)}</div><div class="notif-copy"><b>${n.title}</b><p>${n.text}</p></div><span class="notif-time">${n.time||"ora"}</span></div>`).join("");
 writeJSON("lockNotifications",notifications);
}

function syncNotificationsFromStorage(animateFirst=false){
 notifications=readJSON("lockNotifications",[])||[];
 renderNotifications(animateFirst);
}
function handleDeliveredEmails(delivered){
 if(delivered.length){
   syncNotificationsFromStorage(true);
   showScreen("lockscreen",true);
   if(navigator.vibrate)navigator.vibrate([180,90,180]);
 }
}

updateClock();setInterval(updateClock,30000);renderNotifications();startSchedulerRunner({onDeliver:handleDeliveredEmails});

screens.standby.onclick=()=>showScreen("lockscreen",true);
document.addEventListener("click",e=>{const n=e.target.closest(".notification");if(n)location.href=appLink(n.dataset.app,n.dataset.href)});

let startY=0;
screens.lockscreen.addEventListener("touchstart",e=>startY=e.touches[0].clientY,{passive:true});
screens.lockscreen.addEventListener("touchend",e=>{if(startY-e.changedTouches[0].clientY>55)showScreen("home",true)},{passive:true});

let taps=0,tapTimer=null;
screens.lockscreen.addEventListener("pointerup",()=>{taps++;clearTimeout(tapTimer);if(taps>=4){$("panel").classList.add("open");taps=0}tapTimer=setTimeout(()=>taps=0,1200)});

$("directorHit").onclick=()=>$("panel").classList.add("open");
$("closePanel").onclick=()=>$("panel").classList.remove("open");
function getNotificationFromPanel(){
 return {
   app:$("notifApp").value,
   title:$("notifTitle").value.trim()||"Nuova notifica",
   text:$("notifText").value.trim()||"Nuovo messaggio",
   time:"ora"
 };
}

$("addNotif").onclick=()=>{
 notifications.unshift(getNotificationFromPanel());
 renderNotifications(true);
};

$("scheduleNotif").onclick=()=>{
 clearTimeout(scheduledNotificationTimer);
 clearInterval(scheduledNotificationTicker);

 const notification=getNotificationFromPanel();
 const seconds=Number($("notifDelay").value);
 const target=Date.now()+seconds*1000;

 $("panel").classList.remove("open");
 showScreen("lockscreen",true);

 scheduledNotificationTicker=setInterval(()=>{
   const left=Math.max(0,Math.ceil((target-Date.now())/1000));
   $("notifCountdown").value=left>0?`Notifica tra ${left} secondi`:"Notifica in arrivo";
   if(left<=0)clearInterval(scheduledNotificationTicker);
 },200);

 scheduledNotificationTimer=setTimeout(()=>{
   notifications.unshift(notification);
   renderNotifications(true);
   $("notifCountdown").value="Notifica mostrata";
   if(navigator.vibrate)navigator.vibrate([180,90,180]);
 },seconds*1000);
};

$("scheduleInterlineeEmail").onclick=()=>{
 clearTimeout(scheduledNotificationTimer);
 clearInterval(scheduledNotificationTicker);
 const seconds=Number($("notifDelay").value);
 const event=scheduleEmailDelivery(interlineeEmail,seconds);
 $("notifCountdown").value=`Interlinee programmata per ${new Date(event.targetAt).toLocaleTimeString("it-IT",{hour:"2-digit",minute:"2-digit",second:"2-digit"})}`;
 $("panel").classList.remove("open");
 showScreen("lockscreen",true);
};

$("resetInterlineeEmail").onclick=()=>{
 resetInterlineeDelivery();
 notifications=readJSON("lockNotifications",[])||[];
 renderNotifications();
 $("notifCountdown").value="Interlinee resettata";
};

$("cancelNotif").onclick=()=>{
 clearTimeout(scheduledNotificationTimer);
 clearInterval(scheduledNotificationTicker);
 $("notifCountdown").value="Notifica annullata";
};

$("clearNotifs").onclick=()=>{notifications=[];renderNotifications()};
$("customTime").onchange=e=>{localStorage.setItem("lockTime",e.target.value.trim());updateClock()};
$("customDate").onchange=e=>{localStorage.setItem("lockDate",e.target.value.trim());updateClock()};
$("showLock").onclick=()=>{$("panel").classList.remove("open");showScreen("lockscreen",true)};
$("showHome").onclick=()=>{$("panel").classList.remove("open");showScreen("home",true)};
$("showStandby").onclick=()=>{$("panel").classList.remove("open");showScreen("standby")};
if ("serviceWorker" in navigator) {
  navigator.serviceWorker.register("./sw.js");
}
</script>
</body>
</html>
