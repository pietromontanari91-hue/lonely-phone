<!doctype html>
<html lang="it">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover,user-scalable=no">
<meta name="theme-color" content="#7a064f">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Almost Phone">
<title>Almost Phone</title>

<style>
:root{
  --pink:#ff2aa3;
  --violet:#8e58ff;
  --green:#2fc86d;
  --line:rgba(255,255,255,.28);
  --shadow:0 18px 40px rgba(35,0,25,.28);
}

*{
  box-sizing:border-box;
  -webkit-tap-highlight-color:transparent;
}

html,
body{
  margin:0;
  width:100%;
  min-height:100%;
  height:100%;
  background:#7a064f;
}

body{
  position:fixed;
  inset:0;
  overflow:hidden;
  color:#fff;
  font-family:-apple-system,BlinkMacSystemFont,"SF Pro Display","Segoe UI",sans-serif;
  background:
    radial-gradient(circle at 20% 3%,rgba(255,58,169,.95) 0,transparent 29%),
    radial-gradient(circle at 91% 16%,rgba(118,48,145,.90) 0,transparent 34%),
    linear-gradient(180deg,#b60b72 0%,#8d075d 45%,#4b072f 100%);
}

body::before{
  content:"";
  position:absolute;
  inset:-18%;
  pointer-events:none;
  background:
    conic-gradient(
      from 90deg,
      transparent,
      rgba(255,255,255,.06),
      transparent,
      rgba(255,105,194,.18),
      transparent
    );
  filter:blur(48px);
  animation:drift 14s ease-in-out infinite alternate;
}

@keyframes drift{
  to{transform:translate3d(5%,-3%,0) rotate(7deg)}
}

.phone{
  position:relative;
  z-index:1;
  width:100%;
  height:100dvh;
  min-height:100dvh;
  max-width:520px;
  margin:0 auto;
  padding:
    calc(env(safe-area-inset-top) + 8px)
    20px
    calc(env(safe-area-inset-bottom) + 12px);
  display:flex;
  flex-direction:column;
}

.statusbar{
  display:flex;
  align-items:center;
  justify-content:space-between;
  padding:0 3px 18px;
  font-size:15px;
  font-weight:700;
}

.status-icons{
  display:flex;
  align-items:center;
  gap:7px;
  font-size:13px;
}

.header{
  margin-top:2px;
}

.header h1{
  margin:0;
  font-size:36px;
  line-height:1;
  letter-spacing:-1.4px;
}

.header p{
  margin:8px 0 0;
  font-size:14px;
  opacity:.72;
}

.grid{
  display:grid;
  grid-template-columns:repeat(4,1fr);
  gap:26px 12px;
  margin-top:38px;
}

.app-link{
  text-decoration:none;
  color:#fff;
  text-align:center;
  font-size:13px;
}

.icon{
  width:76px;
  height:76px;
  margin:0 auto 9px;
  border-radius:23px;
  display:grid;
  place-items:center;
  font-size:31px;
  font-weight:700;
  border:1px solid var(--line);
  box-shadow:
    var(--shadow),
    inset 0 1px 0 rgba(255,255,255,.32);
  backdrop-filter:blur(20px) saturate(165%);
  -webkit-backdrop-filter:blur(20px) saturate(165%);
  transition:transform .14s ease;
}

.app-link:active .icon{
  transform:scale(.92);
}

.icon.vybe{
  background:linear-gradient(145deg,#ff44ae,#8657ff);
}

.icon.texty{
  background:linear-gradient(145deg,#ff6ac0,#d23eb4);
}

.icon.callsy{
  background:linear-gradient(145deg,#35d879,#129a55);
}

.icon.pulse{
  background:linear-gradient(145deg,#8f66ff,#4d35d4);
}

.icon.draft{
  background:linear-gradient(145deg,rgba(255,255,255,.26),rgba(255,255,255,.08));
}

.icon.travels{
  background:linear-gradient(145deg,#5fcfff,#5b7dff);
}

.icon.gallery{
  background:linear-gradient(145deg,#ff9c66,#ff4f91);
}

.icon.settings{
  background:linear-gradient(145deg,#b8b8ca,#6b6b7c);
}

.disabled{
  opacity:.38;
  pointer-events:none;
}

.spacer{
  flex:1;
  min-height:20px;
}

.dock{
  flex:0 0 auto;
  height:92px;
  border-radius:31px;
  display:flex;
  align-items:center;
  justify-content:space-around;
  padding:0 10px;
  background:
    linear-gradient(
      135deg,
      rgba(255,255,255,.22),
      rgba(255,255,255,.08)
    );
  border:1px solid rgba(255,255,255,.30);
  box-shadow:
    0 24px 52px rgba(38,0,25,.35),
    inset 0 1px 0 rgba(255,255,255,.34);
  backdrop-filter:blur(26px) saturate(170%);
  -webkit-backdrop-filter:blur(26px) saturate(170%);
}

.dock .icon{
  width:66px;
  height:66px;
  margin:0;
  border-radius:21px;
  font-size:27px;
}

@media(max-width:430px){
  .phone{
    padding-left:16px;
    padding-right:16px;
  }

  .grid{
    gap:24px 8px;
  }

  .icon{
    width:72px;
    height:72px;
    border-radius:22px;
  }

  .dock .icon{
    width:62px;
    height:62px;
  }
}

@media(max-width:375px){
  .icon{
    width:66px;
    height:66px;
    font-size:27px;
  }

  .dock{
    height:84px;
  }

  .dock .icon{
    width:58px;
    height:58px;
  }
}
</style>
</head>

<body>
<main class="phone">
  <div class="statusbar">
    <span id="time">09:41</span>

    <div class="status-icons">
      <span>●●●</span>
      <span>ᯤ</span>
      <span>▰</span>
    </div>
  </div>

  <section class="header">
    <h1>Buongiorno</h1>
    <p>Almost Phone</p>
  </section>

  <section class="grid">
    <a class="app-link" href="apps/vybe/index.html">
      <div class="icon vybe">V</div>
      <span>VYBE</span>
    </a>

    <a class="app-link" href="apps/texty/index.html">
      <div class="icon texty">T</div>
      <span>Texty</span>
    </a>

    <a class="app-link" href="apps/callsy/index.html">
      <div class="icon callsy">☎</div>
      <span>Callsy</span>
    </a>

    <div class="app-link disabled">
      <div class="icon draft">D</div>
      <span>Draft</span>
    </div>

    <a class="app-link" href="apps/travels/index.html">
      <div class="icon travels">✈</div>
      <span>Travels</span>
    </a>

    <div class="app-link disabled">
      <div class="icon gallery">▧</div>
      <span>Gallery</span>
    </div>

    <a class="app-link" href="apps/pulse/index.html">
      <div class="icon pulse">♪</div>
      <span>Pulse</span>
    </a>

    <div class="app-link disabled">
      <div class="icon settings">⚙</div>
      <span>Settings</span>
    </div>
  </section>

  <div class="spacer"></div>

  <nav class="dock">
    <a class="app-link" href="apps/vybe/index.html">
      <div class="icon vybe">V</div>
    </a>

    <a class="app-link" href="apps/texty/index.html">
      <div class="icon texty">T</div>
    </a>

    <a class="app-link" href="apps/callsy/index.html">
      <div class="icon callsy">☎</div>
    </a>

    <a class="app-link" href="apps/pulse/index.html">
      <div class="icon pulse">♪</div>
    </a>
  </nav>
</main>

<script>
function updateTime(){
  document.getElementById("time").textContent =
    new Date().toLocaleTimeString("it-IT",{
      hour:"2-digit",
      minute:"2-digit"
    });
}

updateTime();
setInterval(updateTime,30000);
</script>
</body>
</html>
